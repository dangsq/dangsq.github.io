<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"> 
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">

  <style>
    /* --- 核心变量：高对比度霓虹 --- */
    :root {
      --bg-deep: #050011;       /* 极深紫/黑 */
      --bg-mid: #180c2e;
      --neon-cyan: #00f3ff;     /* 赛博青 */
      --neon-pink: #ff00ff;     /* 蒸汽粉 */
      --neon-purple: #bc13fe;   /* 霓虹紫 */
      --sun-yellow: #ffd700;    /* 夕阳黄 */
      --text-main: #f0f0ff;
      --grid-line: rgba(255, 0, 255, 0.5);
      
      /* 玻璃/全息面板效果 */
      --glass-bg: rgba(10, 5, 30, 0.75);
      --glass-border: 1px solid rgba(0, 243, 255, 0.5);
      --glass-shadow: 0 0 15px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(255, 0, 255, 0.1);
    }

    /* --- 基础布局 --- */
    body {
        background: linear-gradient(to bottom, var(--bg-deep) 0%, var(--bg-mid) 80%, #2b003b 100%);
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        font-family: 'Merriweather', serif;
        color: var(--text-main);
        /* 隐藏滚动条但保留功能 */
        scrollbar-width: none; 
        -ms-overflow-style: none;
    }
    body::-webkit-scrollbar { display: none; }

    /* --- 背景视觉元素 (Z-index < 0) --- */

    /* 1. CRT 屏幕效果覆盖层 (最顶层) */
    .crt-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 2px, 3px 100%;
        z-index: 9999;
        pointer-events: none;
        animation: crtFlicker 0.15s infinite;
        opacity: 0.6;
    }
    @keyframes crtFlicker {
        0% { opacity: 0.55; }
        50% { opacity: 0.6; }
        100% { opacity: 0.55; }
    }

    /* 2. 蒸汽波复古夕阳 */
    .retro-sun {
        position: fixed;
        bottom: 15vh;
        left: 50%;
        transform: translateX(-50%);
        width: 60vh;
        height: 60vh;
        background: linear-gradient(to bottom, var(--sun-yellow), var(--neon-pink));
        border-radius: 50%;
        z-index: -3;
        box-shadow: 0 0 60px var(--neon-pink);
        /* 百叶窗切割效果 */
        -webkit-mask-image: linear-gradient(to bottom, 
            black 0%, black 50%, 
            transparent 50%, transparent 55%, 
            black 55%, black 65%, 
            transparent 65%, transparent 68%, 
            black 68%, black 75%,
            transparent 75%, transparent 77%,
            black 77%, black 82%,
            transparent 82%, transparent 83%,
            black 83%, black 88%,
            transparent 88%, transparent 89%,
            black 89%, black 100%
        );
    }

    /* 3. 3D 滚动网格 */
    .vaporwave-grid {
        position: fixed;
        bottom: -15vh; /* 拉低一点增加透视感 */
        left: -50%;
        width: 200%;
        height: 60vh;
        background-image: 
            linear-gradient(var(--grid-line) 2px, transparent 2px),
            linear-gradient(90deg, var(--grid-line) 2px, transparent 2px);
        background-size: 60px 60px;
        transform: perspective(400px) rotateX(70deg);
        animation: gridMove 2s linear infinite;
        z-index: -2;
        box-shadow: 0 0 80px rgba(255, 0, 255, 0.6);
        /* 远端虚化遮罩 */
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
    }
    @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 0 60px; }
    }

    /* 4. 远处山脉剪影 (伪元素) */
    .mountains {
        position: fixed;
        bottom: 15vh;
        width: 100%;
        height: 15vh;
        background: linear-gradient(to top, #0f0f20, transparent);
        z-index: -2;
        clip-path: polygon(0% 100%, 15% 40%, 30% 90%, 50% 20%, 70% 80%, 85% 30%, 100% 100%);
        background-color: #03000a;
        opacity: 0.9;
    }

    /* 5. 星空 */
    .stars {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px);
        background-size: 500px 500px;
        z-index: -4;
        opacity: 0.8;
    }

    /* --- 内容样式 --- */
    
    /* 文字全局发光 */
    h1, h2, h3, h4, h5, h6, span, div, p, li, a {
      text-shadow: 0 0 5px rgba(0, 243, 255, 0.4);
      color: var(--text-main);
      z-index: 2;
    }

    /* 故障文字效果 (Glitch) */
    .glitch-text {
        position: relative;
        font-family: 'Audiowide', cursive; /* 使用更有科技感的字体 */
        animation: glitch-skew 1s infinite linear alternate-reverse;
    }
    .glitch-text::before, .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
    }
    .glitch-text::before {
        left: 2px;
        text-shadow: -2px 0 var(--neon-pink);
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
    }
    .glitch-text::after {
        left: -2px;
        text-shadow: -2px 0 var(--neon-cyan);
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim2 5s infinite linear alternate-reverse;
    }
    @keyframes glitch-anim {
        0% { clip: rect(12px, 9999px, 32px, 0); }
        50% { clip: rect(64px, 9999px, 80px, 0); }
        100% { clip: rect(4px, 9999px, 20px, 0); }
    }
    @keyframes glitch-anim2 {
        0% { clip: rect(52px, 9999px, 82px, 0); }
        50% { clip: rect(2px, 9999px, 15px, 0); }
        100% { clip: rect(34px, 9999px, 64px, 0); }
    }

    /* 导航栏 */
    .nav-container ul {
        background: rgba(0,0,0,0.6);
        border: 1px solid var(--neon-purple);
        box-shadow: 0 0 15px var(--neon-purple);
        border-radius: 8px;
        padding: 5px;
        backdrop-filter: blur(5px);
    }

    li {
      font-family: 'Press Start 2P', cursive; /* 像素字体 */
      font-size: 10px !important; /* 像素字体要小一点才好看 */
      line-height: 1.5;
      color: var(--neon-cyan) !important;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    li:hover {
      background: var(--neon-pink);
      color: #000 !important;
      text-shadow: none;
      box-shadow: 0 0 20px var(--neon-pink);
      transform: scale(1.05);
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" style="fill:cyan"><circle cx="10" cy="10" r="8"/></svg>'), auto;
    }

    /* 打字机光标 */
    @keyframes typing {
      0% { width: 0; border-color: var(--neon-pink); }
      50% { border-color: var(--neon-cyan); }
      100% { width: 0; border-color: var(--neon-pink); }
    }

    /* 蝴蝶 */
    font[size="+3"] {
      cursor: pointer;
      color: var(--neon-pink) !important;
      text-shadow: 2px 2px 0px var(--neon-cyan);
      filter: drop-shadow(0 0 10px var(--neon-purple));
    }
    font[size="+3"]:hover {
       transform: rotate(15deg) scale(1.3);
    }

    /* 项目卡片 - 全息玻璃风格 */
    .project {
        background: var(--glass-bg);
        border: var(--glass-border);
        box-shadow: var(--glass-shadow);
        border-radius: 5px; /* 更锐利的边角 */
        padding: 20px;
        margin: 25px 0;
        position: relative;
        overflow: hidden;
    }
    
    /* 给卡片加一个扫描线装饰条 */
    .project::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 4px; height: 100%;
        background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-pink));
        box-shadow: 0 0 10px var(--neon-cyan);
    }

    .project-title h3 {
        color: var(--neon-cyan);
        font-family: 'Audiowide', cursive;
        letter-spacing: 1px;
        margin-bottom: 5px;
        text-transform: uppercase;
    }

    .project-summary span {
        background: transparent;
        border: 1px solid var(--neon-pink);
        color: var(--neon-pink);
        font-family: 'Press Start 2P', cursive;
        font-size: 0.6rem;
        box-shadow: 0 0 5px var(--neon-pink) inset;
    }

    .project-toggle {
        border: 1px solid var(--neon-cyan);
        background: rgba(0, 243, 255, 0.1);
        color: var(--neon-cyan);
        font-family: 'Press Start 2P', cursive;
        font-size: 0.7rem;
        padding: 8px 12px;
        cursor: pointer;
        transition: 0.2s;
    }
    .project-toggle:hover {
        background: var(--neon-cyan);
        color: #000;
        box-shadow: 0 0 20px var(--neon-cyan);
    }

    /* Markdown 内容区 */
    .markdown-section {
      max-width: 750px;
    }
    
    /* 图片边框 */
    .markdown-section img {
        border: 2px solid var(--neon-purple);
        box-shadow: 0 0 15px var(--neon-purple);
        border-radius: 4px;
        filter: contrast(1.1) brightness(1.1);
    }

    /* 链接样式 */
    .markdown-section a {
        color: var(--neon-pink);
        text-decoration: none;
        border-bottom: 1px dashed var(--neon-cyan);
        transition: 0.3s;
    }
    .markdown-section a:hover {
        background: var(--neon-pink);
        color: white;
        box-shadow: 0 0 10px var(--neon-pink);
    }

    /* 强制隐藏 docsify 侧边栏按钮（如果存在） */
    .sidebar-toggle { display: none !important; }

  </style>
</head>
<body>

  <br/>
<div style="display: flex; justify-content: space-between; align-items: center; padding-top: 20px;">

  <center>
    <div style="display: flex; align-items: center; justify-content: center; max-width: 900px; margin: 0 auto; position: relative; z-index: 10;">
      <div style="flex: 0 0 100%; text-align: center;">
        
        <div style="margin-bottom: 20px;">
            <font class="glitch-text" data-text="To Feel, and" style="font-size: 40pt; color: #fff; letter-spacing: 2px;">
                To Feel, and
            </font>
        </div>
        
        <span style="display: inline-block; font-family: 'Press Start 2P'; font-size: 20pt; color: var(--neon-cyan); border-right: 10px solid var(--neon-pink); padding-right: 10px; animation: typing 2s steps(10) infinite alternate; text-shadow: 0 0 10px var(--neon-cyan);">
            To Create.
        </span>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: "shengqi dang",
      themeColor: "#00f3ff", 
      hideSidebar: true,
      name: '',
      repo: '',
      executeScript: true,
    }
    
    // 蝴蝶点击互动保留，但仅做动画，不再切换颜色
    const title = document.querySelector('font[size="+3"]');
    title.addEventListener('click', () => {
        title.style.transform = "rotate(360deg) scale(1.5)";
        setTimeout(() => {
            title.style.transform = "rotate(0deg) scale(1)";
        }, 1000);
    });

    // 项目卡片展开逻辑
    (function(){
      function openDetails(el){
        el.classList.add('open');
        el.style.height = el.scrollHeight + 'px';
        el.setAttribute('aria-hidden','false');
      }
      function closeDetails(el){
        el.style.height = el.scrollHeight + 'px';
        void el.offsetHeight;
        el.style.height = '0px';
        el.classList.remove('open');
        el.setAttribute('aria-hidden','true');
      }

      function toggleDetails(container, details, toggleBtn){
        const isOpen = details.classList.contains('open');
        if(isOpen){
          closeDetails(details);
          toggleBtn.setAttribute('aria-expanded','false');
          toggleBtn.textContent = 'ACCESS DATA / 详情';
        } else {
          document.querySelectorAll('.project-details.open').forEach(openEl=>{
            const parent = openEl.closest('.project');
            const btn = parent && parent.querySelector('.project-toggle');
            if(openEl !== details){ 
                closeDetails(openEl); 
                if(btn){ btn.setAttribute('aria-expanded','false'); btn.textContent = 'ACCESS DATA / 详情'; } 
            }
          });
          openDetails(details);
          toggleBtn.setAttribute('aria-expanded','true');
          toggleBtn.textContent = 'MINIMIZE / 收起 ';
        }
      }

      function initProjectBlock(project){
        if(project.dataset._initProject) return;
        project.dataset._initProject = '1';

        const details = project.querySelector('.project-details');
        if(!details) return;
        if(!details.id){
          details.id = 'proj-' + Math.random().toString(36).slice(2,9);
        }

        let toggleBtn = project.querySelector('.project-toggle');
        if(!toggleBtn){
          toggleBtn = document.createElement('button');
          toggleBtn.className = 'project-toggle';
          toggleBtn.textContent = 'ACCESS DATA / 详情';
          toggleBtn.setAttribute('aria-expanded','false');
          toggleBtn.setAttribute('aria-controls', details.id);
          project.querySelector('.project-header').appendChild(toggleBtn);
        } else {
          toggleBtn.setAttribute('aria-controls', details.id);
          toggleBtn.setAttribute('aria-expanded','false');
        }

        details.style.height = '0px';
        details.setAttribute('aria-hidden','true');

        toggleBtn.addEventListener('click', function(){
          toggleDetails(project, details, toggleBtn);
        });

        // 键盘支持
        toggleBtn.addEventListener('keydown', function(e){
          if(e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar'){
            e.preventDefault(); this.click();
          }
        });

        window.addEventListener('resize', function(){
          if(details.classList.contains('open')){
            details.style.height = details.scrollHeight + 'px';
          }
        });
      }

      function initAllProjects(){
        document.querySelectorAll('.project').forEach(initProjectBlock);
      }

      if(window.$docsify){
        window.$docsify.plugins = window.$docsify.plugins || [];
        window.$docsify.plugins.push(function(hook, vm){
          hook.doneEach(function(){
            initAllProjects();
          });
        });
      } else {
        document.addEventListener('DOMContentLoaded', initAllProjects);
      }
    })();
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

</body>
</html>
