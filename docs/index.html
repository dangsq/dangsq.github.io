<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shengqi Dang - Y2K Kawaii Realm</title>
    <link rel="icon" href="./1F34E.svg">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet"> 
    
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    
    <style>
        /* --- 核心变量 (Y2K Kawaii Aesthetic) --- */
        :root {
            /* 💿 Y2K 金属与全息色板 */
            --y2k-bg-deep: #f2d1fe; /* 深空紫底色 */
            --y2k-chrome: #69737f; /* 铬金属色 */
            --y2k-holo-gradient: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #a1c4fd 50%, #c2e9fb 75%, #d4fc79 100%); /* 全息渐变 */
            --y2k-pink-glow: rgba(255, 105, 180, 0.6);
            --y2k-blue-glow: rgba(135, 206, 235, 0.6);

            /* 🎀 Kawaii 强调色 */
            --kawaii-pink: #FF69B4; /* 热粉 */
            --kawaii-blue: #87CEFA; /* 天蓝 */
            --kawaii-purple: #DDA0DD; /* 薰衣草 */

            /* 🔲 玻璃与金属面板 */
            --panel-bg: rgba(255, 255, 255, 0.5); /* 更通透的玻璃 */
            --panel-border: 2px solid rgba(255, 255, 255, 0.7); /* 半透明白边框 */
            --panel-chrome-border: 3px solid var(--y2k-chrome); /* 金属边框 */
            --panel-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            --panel-blur: blur(12px);
            --text-main: #390360; /* 亮色文本以适应深背景 */
            --text-highlight: #FFFFFF;

            /* 🌌 背景变量 */
            --grid-line-color: rgba(255, 0, 191, 1.0); /* 粉色网格 */
            --star-color: #ff0000;
        }

        /* --- 全局基础 --- */
        body {
            background-color: var(--y2k-bg-deep);
            background-image: 
                /* 数码噪声纹理 */
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="100%" height="100%" fill="%232b213a"/><rect width="2" height="2" fill="%233b314a"/></svg>'),
                radial-gradient(circle at center, #4a3563 0%, var(--y2k-bg-deep) 100%);
            background-blend-mode: soft-light;
            
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Roboto Mono', monospace; /* 默认代码字体 */
            color: var(--text-main);
            overflow-x: hidden;
        }
        
        ::selection { background: var(--kawaii-pink); color: #FFF; text-shadow: 0 0 5px #FFF; }

        /* --- 背景视觉层 (Y2K Cyber Scenery) --- */
        .dynamic-grid-floor {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 55vh;
            background-image: 
                linear-gradient(to top, var(--grid-line-color) 2px, transparent 2px), 
                linear-gradient(to right, var(--grid-line-color) 2px, transparent 2px);
            background-size: 50px 50px;
            transform: perspective(400px) rotateX(75deg);
            transform-origin: bottom center;
            z-index: -5;
            opacity: 0.5;
            animation: gridScroll 20s linear infinite; 
            filter: drop-shadow(0 0 10px var(--y2k-pink-glow));
            -webkit-mask-image: linear-gradient(to top, black 40%, transparent 100%); 
        }
        @keyframes gridScroll {
            from { background-position: 0 0; }
            to { background-position: 0 100px; }
        }

        /* ✨ Y2K 漂浮元素 (星星, 环, 像素心) */
        .floating-element {
            position: fixed; z-index: -3; pointer-events: none;
            will-change: transform; opacity: 0.8;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
        }
        
        /* 像素星星 */
        .pixel-star {
            color: var(--y2k-chrome);
            font-family: 'Press Start 2P'; font-size: 25px;
            animation: twinkle 3s infinite alternate, floatY 15s infinite ease-in-out alternate;
        }
        /* 数码环 */
        .cyber-ring {
            width: 80px; height: 80px;
            border: 4px solid var(--kawaii-blue); border-radius: 50%;
            box-shadow: 0 0 15px var(--kawaii-blue);
            animation: rotateRing 10s linear infinite, floatX 20s infinite ease-in-out alternate;
        }
        .cyber-ring::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 110%; height: 110%; border: 2px dashed var(--kawaii-pink);
            border-radius: 50%; transform: translate(-50%, -50%);
        }
        /* 像素心 */
        .pixel-heart {
            font-family: 'Press Start 2P'; color: var(--kawaii-pink); font-size: 30px;
            animation: pulseHeart 2s infinite, floatY 12s infinite ease-in-out alternate-reverse;
            text-shadow: 0 0 10px var(--kawaii-pink);
        }

        @keyframes twinkle { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2) rotate(180deg); } }
        @keyframes rotateRing { from { transform: rotate(0deg) rotateX(45deg); } to { transform: rotate(360deg) rotateX(45deg); } }
        @keyframes pulseHeart { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes floatY { 0% { transform: translateY(0); } 100% { transform: translateY(-30px); } }
        @keyframes floatX { 0% { transform: translateX(0); } 100% { transform: translateX(40px); } }

        .stars-background {
            position: fixed; top:0; left:0; width: 100%; height: 100%; z-index: -6;
            background-image: radial-gradient(2px 2px at 50% 50%, var(--star-color), transparent),
                              radial-gradient(2px 2px at 20% 80%, var(--star-color), transparent),
                              radial-gradient(2px 2px at 80% 20%, var(--star-color), transparent);
            background-size: 200px 200px;
            animation: starScroll 60s linear infinite; opacity: 0.3;
        }
        @keyframes starScroll { from {background-position: 0 0;} to {background-position: 1000px 1000px;} }


        /* --- 布局与导航 (修复空白问题) --- */
        /* 创建一个紧凑的头部容器 */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            max-width: 900px;
            height: 120px;
            margin: 20px auto 10px auto; /* 减少底部边距 */
            background: var(--panel-bg);
            backdrop-filter: var(--panel-blur);
            border-radius: 20px;
            border: var(--panel-border);
            box-shadow: var(--panel-shadow), inset 0 0 10px rgba(255,255,255,0.2);
            position: relative;
            z-index: 20;
        }

        /* 头部图标区 */
        .header-icons span {
            font-size: 32px; margin-right: 10px; cursor: pointer;
            filter: drop-shadow(0 0 5px var(--kawaii-pink));
            transition: transform 0.2s;
            display: inline-block;
        }
        .header-icons span:hover { transform: scale(1.2) rotate(10deg); }

        /* 导航胶囊 */
        .nav-pills ul {
            display: flex; list-style: none; margin: 0; padding: 0; gap: 10px;
        }
        .nav-pills li {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--y2k-chrome);
            padding: 8px 16px;
            border-radius: 30px; /* 胶囊形状 */
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .nav-pills li center {
            font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--y2k-chrome);
            /* text-shadow: 0 0 5px rgba(255,255,255,0.5); */
        }
        .nav-pills li span {
            font-family: 'Roboto Mono', monospace; font-size: 0.7rem; color: var(--y2k-chrome); display: block; margin-top: 2px;
        }
        /* 导航悬停效果 - 全息光泽 */
        .nav-pills li:hover {
            background: var(--y2k-holo-gradient);
            border-color: transparent;
            box-shadow: 0 0 15px var(--y2k-pink-glow);
            transform: translateY(-3px);
        }
        .nav-pills li:hover center, .nav-pills li:hover span { color: #FFF !important; text-shadow: none; }
        

        /* 标题区域 (紧凑) */
        .hero-title {
            text-align: center; margin: 20px auto 30px auto; position: relative; z-index: 10;
        }
        .glitch-text {
            font-family: 'Press Start 2P', cursive;
            color: var(--y2k-chrome);
            font-size: 32pt;
            text-shadow: 3px 3px 0px var(--kawaii-pink), -3px -3px 0px var(--kawaii-blue);
            letter-spacing: -2px;
            animation: holographicText 3s infinite alternate;
        }
        @keyframes holographicText {
            0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); }
        }
        .subtitle-text {
            font-family: 'Orbitron', sans-serif; letter-spacing: 2px;
            background: var(--y2k-holo-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; font-size: 20pt;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }


        /* --- 主内容区域 (Docsify) --- */
        /* 修复空白的关键：移除不必要的 margin-top */
        .markdown-section {
            max-width: 850px;
            margin: 0 auto 60px auto !important; /* 移除巨大的顶部边距 */
            padding: 30px !important;
            background: var(--panel-bg);
            backdrop-filter: var(--panel-blur);
            border: var(--panel-chrome-border); /* 金属边框 */
            border-radius: 25px;
            box-shadow: 0 0 30px var(--y2k-pink-glow), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative; z-index: 5;
        }
        
        /* Y2K 风格标题栏 */
        .markdown-section:before {
            content: '💿 Y2K_KAWAII_SYSTEM // ONLINE';
            display: block;
            background: var(--y2k-holo-gradient);
            color: #FFF;
            font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 1px;
            font-size: 12px; padding: 8px 20px;
            margin: -33px -33px 25px -33px; /* 调整位置以适应新边框 */
            border-radius: 22px 22px 0 0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            border-bottom: 3px solid var(--y2k-chrome);
        }

        /* 内容样式 */
        h1, h2, h3 {
            font-family: 'Orbitron', sans-serif; text-transform: uppercase;
            color: var(--y2k-chrome); text-shadow: 0 0 10px var(--y2k-blue-glow);
            border-bottom: 2px dashed var(--kawaii-pink); padding-bottom: 10px; margin-top: 1.5em;
        }
        h1 { font-size: 2.5em; border-bottom: 3px solid var(--y2k-chrome); }
        
        p, li { font-family: 'Roboto Mono', monospace; line-height: 1.8; color: var(--text-main); }

        a { color: var(--kawaii-pink); text-decoration: none; font-weight: bold; transition: all 0.3s; }
        a:hover { color: var(--kawaii-blue); text-shadow: 0 0 10px var(--kawaii-blue); }

        /* 项目卡片 */
        .project {
            background: rgba(255,255,255,0.08); border: 1px solid var(--y2k-chrome);
            border-radius: 15px; padding: 20px; margin: 30px 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 弹性过渡 */
        }
        .project:hover {
            transform: scale(1.03); box-shadow: 0 0 20px var(--y2k-pink-glow);
            background: rgba(255,255,255,0.12);
        }

        /* 按钮 (像糖果/果冻) */
        .project-toggle {
            background: linear-gradient(135deg, var(--kawaii-pink), var(--kawaii-purple));
            border: 2px solid #fff; color: #fff;
            font-family: 'Orbitron', sans-serif; font-size: 0.9rem; padding: 10px 20px;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4), inset 0 2px 5px rgba(255,255,255,0.4);
            transition: all 0.3s;
        }
        .project-toggle:hover {
            transform: translateY(-3px); box-shadow: 0 8px 20px rgba(135, 206, 235, 0.6);
            background: linear-gradient(135deg, var(--kawaii-blue), var(--kawaii-purple));
        }

        /* 图片样式 */
        .markdown-section img {
            border: 3px solid var(--y2k-chrome); border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3); transition: all 0.3s;
        }
        .markdown-section img:hover {
            box-shadow: 0 0 25px var(--y2k-holo-gradient); border-color: var(--kawaii-pink);
        }
    </style>
</head>
<body>
