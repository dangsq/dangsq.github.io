<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shengqi Dang</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦋</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&family=Zhi+Mang+Xing&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    
    <style>
    :root {
        /* =========================================
           [学术模式 - 新中式雅致版]
           Palette: 汝窑天青 (Pale Cyan), 墨色 (Ink), 朱砂 (Vermilion)
           ========================================= */
        --paper-bg: #fdfbf7;       /* 更干净的米白 (宣纸) */
        /* 叠加一个极淡的竖线纹理 (信笺感) */
        --paper-pattern: repeating-linear-gradient(to right, 
            transparent, 
            transparent 39px, 
            rgba(200, 200, 200, 0.15) 40px
        );
        
        --ink-primary: #2c3e50;    /* 黛蓝深灰，比纯黑更有质感 */
        --ink-secondary: #5d6b7a;  /* 次级文字色 */
        --accent-color: #bc3e34;   /* 中国红 (更正红一点) */
        --accent-sub: #78909c;     /* 汝窑青灰 (链接色) */
        
        --font-title: 'Ma Shan Zheng', cursive; 
        --font-serif: 'Playfair Display', 'Noto Serif SC', serif; /* 英文衬线+中文宋体 */
        --font-body: 'Noto Serif SC', serif;
        
        --border-deco: rgba(44, 62, 80, 0.1); /* 装饰边框色 */
    }

    /* =========================================
       [个人模式 - 保持原样不动]
       ========================================= */
    [data-theme="personal"] {
        --paper-bg: #1a1a1c;
        --paper-pattern: none; /* 个人模式不需要竖线 */
        --paper-texture: url("https://www.transparenttextures.com/patterns/stardust.png"); /* 恢复原有纹理 */
        
        --ink-primary: #e6e6e6;
        --ink-secondary: #a0a0a0;
        --accent-color: #c94c4c;
        --accent-sub: #8fa0c0;
        --border-deco: transparent;
    }

    /* =========================================
       全局基础设定
       ========================================= */
    body {
        margin: 0; padding: 0;
        font-family: var(--font-body);
        background-color: var(--paper-bg);
        background-image: var(--paper-pattern); /* 应用竖线纹理 */
        color: var(--ink-primary);
        transition: background-color 1.0s ease, color 0.8s ease;
        overflow-x: hidden;
        cursor: none; 
        font-weight: 300;
        letter-spacing: 0.04em;
    }

    /* 个人模式下的背景覆盖 (恢复原有材质感) */
    [data-theme="personal"] body {
        background-image: var(--paper-texture);
    }

    /* 学术模式 - 角落窗棂装饰 (仅在学术模式显示) */
    .corner-lattice {
        position: fixed;
        width: 150px; height: 150px;
        pointer-events: none;
        z-index: -1;
        opacity: 0.15;
        border: 2px solid var(--ink-primary);
        transition: opacity 0.5s;
    }
    .corner-lattice.top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }
    .corner-lattice.top-right { top: 20px; right: 20px; border-left: none; border-bottom: none; }
    .corner-lattice.bottom-left { bottom: 20px; left: 20px; border-right: none; border-top: none; }
    .corner-lattice.bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }

    /* 内部回纹装饰 */
    .corner-lattice::after {
        content: ''; position: absolute;
        width: 70%; height: 70%;
        border: 1px solid var(--ink-primary);
    }
    .top-left::after { top: 0; left: 0; }
    .top-right::after { top: 0; right: 0; }
    .bottom-left::after { bottom: 0; left: 0; }
    .bottom-right::after { bottom: 0; right: 0; }

    /* 个人模式隐藏这些装饰 */
    [data-theme="personal"] .corner-lattice {
        opacity: 0;
    }

    /* 水墨背景层 */
    .ink-bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: -10;
        background: radial-gradient(circle at 80% 20%, rgba(188, 62, 52, 0.04), transparent 40%),
                    radial-gradient(circle at 20% 80%, rgba(120, 144, 156, 0.08), transparent 50%);
        pointer-events: none;
        transition: opacity 0.5s;
    }

    .mountain-silhouette {
        position: fixed; bottom: 0; left: 0; width: 100%; height: 30vh;
        background-repeat: no-repeat;
        background-position: bottom center;
        background-size: cover;
        opacity: 0.1;
        z-index: -5;
        pointer-events: none;
        mask-image: linear-gradient(to top, black, transparent);
        -webkit-mask-image: linear-gradient(to top, black, transparent);
        background-image: url('https://images.unsplash.com/photo-1517865288-978fcb780652?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
        filter: grayscale(100%) contrast(120%) sepia(20%);
    }

    /* =========================================
       自定义鼠标 (保留原逻辑)
       ========================================= */
    #brush-cursor {
        position: fixed; top: 0; left: 0; width: 12px; height: 12px;
        background: var(--ink-primary);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        opacity: 0.8;
        mix-blend-mode: multiply;
        transition: width 0.2s, height 0.2s, opacity 0.2s;
    }
    [data-theme="personal"] #brush-cursor { mix-blend-mode: normal; background: var(--ink-primary); }
    #brush-cursor.hovered { width: 30px; height: 30px; opacity: 0.3; background: var(--accent-color); }
    #ink-trail-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998; pointer-events: none; }

    /* =========================================
       UI 组件
       ========================================= */
    
    /* 印章开关 */
    .seal-switch {
        position: fixed; top: 40px; right: 40px; z-index: 101;
        width: 46px; height: 46px;
        background: rgba(255,255,255,0.5);
        border: 2px solid var(--accent-color);
        color: var(--accent-color);
        font-family: var(--font-title);
        font-size: 1.4rem;
        border-radius: 4px; 
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.4s ease;
        backdrop-filter: blur(2px);
    }
    .seal-switch:hover {
        background: var(--accent-color);
        color: var(--paper-bg);
        box-shadow: 0 4px 15px rgba(188, 62, 52, 0.4);
    }
    [data-theme="personal"] .seal-switch { background: transparent; }

    /* 导航栏 */
    .nav-wrapper {
        position: fixed; top: 45px; width: 100%;
        display: flex; justify-content: center;
        z-index: 100;
    }
    .classic-nav ul { display: flex; gap: 50px; list-style: none; margin: 0; padding: 0; }
    .classic-nav a {
        text-decoration: none;
        color: var(--ink-secondary);
        font-family: var(--font-serif);
        font-weight: 500;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        position: relative;
        transition: color 0.3s;
    }
    .classic-nav a::after {
        content: '';
        position: absolute; bottom: -5px; left: 50%; width: 4px; height: 4px;
        background: var(--accent-color);
        border-radius: 50%;
        transform: translateX(-50%) scale(0);
        transition: transform 0.3s ease;
    }
    .classic-nav a:hover { color: var(--ink-primary); }
    .classic-nav a:hover::after { transform: translateX(-50%) scale(1); }

    /* =========================================
       Hero Section (核心视觉区)
       ========================================= */
    .hero-section {
        text-align: center;
        margin-top: 18vh;
        margin-bottom: 60px;
        position: relative;
        z-index: 10;
        padding: 40px 0;
    }

    /* 学术模式下的装饰框 - 细线框 */
    .hero-section::before {
        content: '';
        position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        width: 600px; height: 100%;
        border-top: 1px solid var(--border-deco);
        border-bottom: 1px solid var(--border-deco);
        z-index: -1;
    }
    [data-theme="personal"] .hero-section::before { display: none; }

    /* 竖排装饰字 */
    .vertical-decoration {
        position: absolute; top: 10px; right: 20%; /* 移到右侧更有味道 */
        writing-mode: vertical-rl;
        font-family: var(--font-title);
        color: var(--accent-color);
        opacity: 0.8;
        font-size: 2.5rem;
        pointer-events: none;
        letter-spacing: 0.2em;
        text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
    }
    
    /* 英文主标题 - 更优雅的衬线体 */
    .main-title {
        font-family: var(--font-serif);
        font-size: 4.5rem;
        margin-bottom: 10px;
        color: var(--ink-primary);
        font-weight: 400;
        letter-spacing: -0.02em;
        position: relative;
        display: inline-block;
    }
    
    /* 名字后的印章效果 (仅学术模式) */
    .main-title::after {
        content: '党'; /* 姓氏印章 */
        position: absolute; top: 10px; right: -50px;
        width: 36px; height: 36px;
        line-height: 36px;
        background: var(--accent-color);
        color: #fff;
        font-family: var(--font-title);
        font-size: 1.2rem;
        border-radius: 4px;
        opacity: 0.9;
        transform: rotate(8deg);
        box-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    [data-theme="personal"] .main-title::after { display: none; }

    /* 个人模式标题样式复原 */
    [data-theme="personal"] .main-title {
        font-family: var(--font-title); /* 个人模式用书法体 */
        font-size: 5rem;
        text-shadow: 2px 2px 0px var(--paper-bg);
    }

    .sub-title {
        font-family: var(--font-body);
        font-size: 1rem;
        color: var(--ink-secondary);
        letter-spacing: 0.3em;
        margin-top: 15px;
        text-transform: uppercase;
        border-top: 1px solid var(--accent-color);
        display: inline-block;
        padding-top: 15px;
    }

    /* =========================================
       Content - Markdown 区域
       ========================================= */
    .markdown-section {
        max-width: 820px;
        margin: 0 auto 100px auto !important;
        padding: 40px 60px !important;
        position: relative;
        z-index: 5;
    }
    
    /* 学术模式：内容区背景 (让文字更清晰) */
    .markdown-section {
        background: rgba(255, 255, 255, 0.4) !important;
        backdrop-filter: blur(5px);
        box-shadow: 0 4px 30px rgba(0,0,0,0.02);
    }
    [data-theme="personal"] .markdown-section {
        background: transparent !important;
        backdrop-filter: none;
        box-shadow: none;
    }

    /* 标题排版 */
    h1 { 
        font-family: var(--font-serif);
        text-align: center; 
        font-size: 2em; 
        margin-bottom: 2em; 
        color: var(--ink-primary) !important; 
        border-bottom: none;
        position: relative;
    }
    /* 学术模式 H1 下的装饰 */
    h1::after {
        content: ''; display: block; 
        width: 40px; height: 2px; background: var(--accent-color);
        margin: 15px auto 0;
    }

    h2 {
        font-family: var(--font-serif);
        font-size: 1.5em;
        margin-top: 2em;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(0,0,0,0.05);
        color: var(--ink-primary) !important;
        display: flex; align-items: center;
    }
    /* H2 前的装饰改为竖条 */
    h2::before {
        content: '';
        display: inline-block; width: 4px; height: 1em;
        background: var(--accent-color);
        margin-right: 15px;
        transform: none; /* 取消旋转 */
    }

    p, li { 
        font-size: 1.05rem; 
        line-height: 1.8; 
        color: var(--ink-secondary) !important;
        text-align: justify; 
    }
    
    a { 
        color: var(--accent-sub) !important; 
        text-decoration: none; 
        border-bottom: 1px solid rgba(120, 144, 156, 0.3); 
        transition: all 0.2s; 
    }
    a:hover { 
        color: var(--accent-color) !important;
        border-bottom-color: var(--accent-color);
        background: rgba(188, 62, 52, 0.05);
    }

    blockquote {
        border-left: 3px solid var(--accent-color);
        background: rgba(0,0,0,0.02);
        margin: 2em 0; padding: 15px 25px;
        font-family: var(--font-body);
        font-style: italic;
        color: var(--ink-secondary) !important;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
        .main-title { font-size: 3rem; }
        .hero-section::before { width: 90%; }
        .corner-lattice { display: none; } /* 移动端隐藏角落装饰 */
        .markdown-section { padding: 30px 20px !important; width: 90%; background: transparent !important; }
        .vertical-decoration { display: none; }
        .seal-switch { top: auto; bottom: 30px; right: 30px; }
    }

    </style>
</head>
<body>

    <div class="corner-lattice top-left"></div>
    <div class="corner-lattice top-right"></div>
    <div class="corner-lattice bottom-left"></div>
    <div class="corner-lattice bottom-right"></div>

    <div class="ink-bg"></div>
    <div class="mountain-silhouette"></div>
    <canvas id="ink-trail-canvas"></canvas>

    <div id="brush-cursor"></div>

    <button class="seal-switch" id="modeBtn" onclick="toggleModeWithAnim()">
        <span>境</span> </button>

    <div class="nav-wrapper">
        <nav class="classic-nav" style="right: 80px;">
            <ul id="nav-list"></ul>
        </nav>
    </div>

    <div class="hero-section">
        <div class="vertical-decoration" id="vert-decor">博学笃行</div> 
        
        <div class="main-title" id="hero-text">Shengqi Dang</div>
        <br>
        <div class="sub-title" id="sub-text">Logic & Romance</div>
    </div>

    <div id="app"></div>

    <script>
        // --- 核心配置 ---
        const config = {
            academic: {
                theme: 'academic',
                heroText: 'Shengqi Dang', // 英文名用衬线体更学术
                subText: 'Researcher · Developer · Dreamer', // 更具体的学术身份
                sealChar: '理', 
                vertDecor: '博学笃行', // 竖排装饰字：博学笃行 (Scholarly & Dedicated)
                homeLink: '#/README.md',
                menu: [
                    { text: 'About', link: '#/README.md' },
                    { text: 'Research', link: '#/pub.md' },
                    { text: 'Projects', link: '#/proj.md' },
                    { text: 'CV', link: '#/cv.md' }
                ]
            },
            personal: {
                theme: 'personal',
                heroText: 'Ethereal Void',
                subText: 'Collecting fallen blossoms in silence.', 
                sealChar: '心',
                vertDecor: '心游万仞', // 竖排装饰字
                homeLink: '#/README-pers.md',
                menu: [
                    { text: 'Essence', link: '#/README-pers.md' },
                    { text: 'Gallery', link: '#/works.md' },
                    { text: 'Mind', link: '#/blogs.md' }
                ]
            }
        };

        let currentMode = 'academic';

        // --- 1. 水墨光标逻辑 (Ink Brush Cursor) ---
        const brushCursor = document.getElementById('brush-cursor');
        const canvas = document.getElementById('ink-trail-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let points = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.addEventListener('mousemove', (e) => {
            brushCursor.style.left = e.clientX + 'px';
            brushCursor.style.top = e.clientY + 'px';
            points.push({ x: e.clientX, y: e.clientY, age: 0, force: Math.random() });

            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') {
                brushCursor.classList.add('hovered');
            } else {
                brushCursor.classList.remove('hovered');
            }
        });

        function inkLoop() {
            ctx.clearRect(0, 0, width, height);
            if (points.length > 1) {
                ctx.beginPath();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = 0; i < points.length - 1; i++) {
                    const p1 = points[i];
                    const p2 = points[i+1];
                    p1.age++;
                    
                    const isDark = currentMode === 'personal';
                    // 学术模式下墨迹稍微蓝一点，个人模式纯白/灰
                    const color = isDark ? '230, 230, 230' : '44, 62, 80'; 
                    const opacity = 1 - (p1.age / 25);
                    
                    if (opacity > 0) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(${color}, ${opacity * 0.4})`;
                        ctx.lineWidth = (15 - p1.age * 0.5) * p1.force;
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
                points = points.filter(p => p.age < 25);
            }
            requestAnimationFrame(inkLoop);
        }
        inkLoop();


        // --- 2. 页面逻辑 & 切换动画 ---

        function toggleModeWithAnim() {
            const btn = document.getElementById('modeBtn');
            btn.style.transform = "rotate(360deg) scale(0.8)";
            setTimeout(() => { btn.style.transform = ""; }, 400);

            const targetMode = currentMode === 'academic' ? 'personal' : 'academic';
            
            document.body.style.opacity = 0;
            
            setTimeout(() => {
                window.location.hash = config[targetMode].homeLink;
                toggleMode();
                document.body.style.opacity = 1;
            }, 600);
        }

        function toggleMode() {
            currentMode = currentMode === 'academic' ? 'personal' : 'academic';
            renderInterface();
        }

        function renderInterface() {
            const data = config[currentMode];
            const navList = document.getElementById('nav-list');
            const heroText = document.getElementById('hero-text');
            const subText = document.getElementById('sub-text');
            const vertDecor = document.getElementById('vert-decor');
            const modeBtn = document.getElementById('modeBtn');

            if (currentMode === 'personal') {
                document.documentElement.setAttribute('data-theme', 'personal');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }

            modeBtn.innerHTML = `<span>${data.sealChar}</span>`;
            heroText.innerText = data.heroText;
            subText.innerText = data.subText;
            if(vertDecor) vertDecor.innerText = data.vertDecor;

            navList.innerHTML = '';
            data.menu.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${item.link}">${item.text}</a>`;
                navList.appendChild(li);
            });
        }

        // --- Docsify ---
        window.$docsify = {
            name: "Shengqi Dang",
            themeColor: "#bc3e34", 
            hideSidebar: true,
            executeScript: true,
            auto2top: true,
            plugins: [
                function(hook, vm) {
                    hook.doneEach(function() {
                        const hash = window.location.hash;
                        if (hash.includes('README-pers.md') || hash.includes('works.md') || hash.includes('blogs.md')) {
                             if(currentMode !== 'personal') {
                                 currentMode = 'personal';
                                 renderInterface();
                             }
                        } else {
                             if(currentMode !== 'academic') {
                                 currentMode = 'academic';
                                 renderInterface();
                             }
                        }
                    });
                }
            ]
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash.includes('README-pers.md')) {
                currentMode = 'personal';
            }
            renderInterface();
        });
    </script>

    <script src="init_proj.js"></script> 
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
