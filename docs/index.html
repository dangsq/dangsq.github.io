<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shengqi Dang - Vaporwave Ultimate</title>
  <link rel="icon" href="./1F34E.svg">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"> 
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* --- 核心变量 --- */
    :root {
      --bg-deep: #050011;       
      --bg-mid: #180c2e;
      --neon-cyan: #4aebf4;     
      --neon-pink: #ff00ff;     
      --neon-purple: #bc13fe;   
      --sun-yellow: #ffd700;    
      --text-main: #ffffff;     
      --grid-line: rgba(255, 0, 255, 0.4);
      
      /* 玻璃面板变量 */
      --panel-bg: rgba(13, 2, 33, 0.85); 
      --panel-blur: 12px;                
      --panel-border: 1px solid rgba(0, 243, 255, 0.5);
      --panel-glow: 0 0 30px rgba(0, 243, 255, 0.15);
    }

    /* --- 全局基础 --- */
    body {
        background: linear-gradient(to bottom, var(--bg-deep) 0%, var(--bg-mid) 80%, #2b003b 100%);
        min-height: 100vh;
        margin: 0;
        padding: 0;
        font-family: 'Merriweather', serif;
        color: var(--text-main);
        overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { 
        background: linear-gradient(var(--neon-purple), var(--neon-cyan)); 
        border-radius: 5px;
        border: 2px solid var(--bg-deep);
    }
    ::selection { background: var(--neon-pink); color: #fff; text-shadow: none; }

    /* --- 背景视觉层 (Z-index < 0) --- */

    /* 1. CRT 扫描线 */
    .crt-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        background-size: 100% 2px, 3px 100%;
        z-index: 9999; pointer-events: none; opacity: 0.15;
    }

    /* 2. 复古夕阳 */
    .retro-sun {
        position: fixed; bottom: 20vh; left: 50%; transform: translateX(-50%);
        width: 50vh; height: 50vh;
        background: linear-gradient(to bottom, var(--sun-yellow), var(--neon-pink));
        border-radius: 50%; z-index: -5; 
        box-shadow: 0 0 80px var(--neon-pink);
        -webkit-mask-image: linear-gradient(to bottom, black 0%, black 50%, transparent 50%, transparent 55%, black 55%, black 65%, transparent 65%, transparent 68%, black 68%, black 75%, transparent 75%, transparent 77%, black 77%, black 82%, transparent 82%, transparent 83%, black 83%, black 88%, transparent 88%, transparent 89%, black 89%, black 100%);
    }

    /* 3. 3D 网格 */
    .vaporwave-grid {
        position: fixed; bottom: -20vh; left: -50%; width: 200%; height: 70vh;
        background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 50px 50px; transform: perspective(300px) rotateX(60deg);
        animation: gridMove 3s linear infinite; z-index: -2;
        box-shadow: 0 0 50px rgba(255, 0, 255, 0.4);
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%);
    }
    @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 50px; } }

    /* 4. 星空 */
    .stars {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px);
        background-size: 500px 500px; z-index: -6; opacity: 0.6;
    }

    /* --- ✨ 新增元素：赛博城市剪影 ✨ --- */
    .cyber-city {
        position: fixed;
        bottom: 15vh; /* 对齐地平线 */
        left: 0;
        width: 100%;
        height: 15vh;
        background: 
            linear-gradient(to top, #000 0%, transparent 100%),
            repeating-linear-gradient(90deg, 
                #000 0px, #000 10px, 
                transparent 10px, transparent 15px,
                #000 15px, #000 25px,
                transparent 25px, transparent 40px
            );
        z-index: -4;
        opacity: 0.7;
        /* 使用 clip-path 制作高低错落的楼房 */
        clip-path: polygon(
            0% 100%, 5% 100%, 5% 60%, 10% 60%, 10% 80%, 15% 80%, 15% 40%, 20% 40%, 20% 85%, 
            25% 85%, 25% 50%, 30% 50%, 30% 70%, 35% 70%, 35% 30%, 40% 30%, 40% 90%, 
            45% 90%, 45% 55%, 50% 55%, 50% 20%, 55% 20%, 55% 60%, 60% 60%, 60% 35%, 
            65% 35%, 65% 75%, 70% 75%, 70% 45%, 75% 45%, 75% 80%, 80% 80%, 80% 50%, 
            85% 50%, 85% 70%, 90% 70%, 90% 40%, 95% 40%, 95% 100%, 100% 100%
        );
    }

    /* --- ✨ 新增元素：旋转的线框金字塔 ✨ --- */
    .pyramid-container {
        position: fixed;
        width: 150px;
        height: 150px;
        z-index: -3;
        perspective: 1000px;
        opacity: 0.6;
        pointer-events: none;
    }
    .p-left { top: 20%; left: 5%; }
    .p-right { top: 40%; right: 5%; }

    .pyramid {
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        animation: spin 15s infinite linear;
    }
    .side {
        position: absolute;
        width: 0; height: 0;
        border-left: 75px solid transparent;
        border-right: 75px solid transparent;
        border-bottom: 150px solid rgba(0, 243, 255, 0.1); /* 青色半透明填充 */
        opacity: 0.7;
    }
    /* 描边效果 */
    .side::after {
        content: '';
        position: absolute;
        left: -75px; top: 0px;
        width: 0; height: 0;
        border-left: 75px solid transparent;
        border-right: 75px solid transparent;
        border-bottom: 150px solid transparent;
    }
    /* 金字塔四个面 */
    .side:nth-child(1) { transform: rotateY(0deg) translateZ(30px) rotateX(30deg); border-bottom-color: rgba(0, 243, 255, 0.2); }
    .side:nth-child(2) { transform: rotateY(90deg) translateZ(30px) rotateX(30deg); border-bottom-color: rgba(255, 0, 255, 0.2); }
    .side:nth-child(3) { transform: rotateY(180deg) translateZ(30px) rotateX(30deg); border-bottom-color: rgba(0, 243, 255, 0.2); }
    .side:nth-child(4) { transform: rotateY(270deg) translateZ(30px) rotateX(30deg); border-bottom-color: rgba(255, 0, 255, 0.2); }
    
    @keyframes spin {
        from { transform: rotateY(0deg) rotateX(10deg); }
        to { transform: rotateY(360deg) rotateX(10deg); }
    }

    /* --- ✨ 新增元素：流星/数据流 ✨ --- */
    .shooting-star {
        position: fixed;
        top: 0; right: 0;
        width: 200px; height: 2px;
        background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        transform: rotate(-45deg);
        z-index: -4;
        opacity: 0;
        animation: shoot 6s infinite ease-in-out;
    }
    .shooting-star:nth-child(2) { top: 20%; right: -10%; animation-delay: 2s; width: 150px; background: linear-gradient(90deg, transparent, var(--neon-pink), transparent); }
    .shooting-star:nth-child(3) { top: 40%; right: -20%; animation-delay: 4s; width: 250px; }

    @keyframes shoot {
        0% { transform: translate(100px, -100px) rotate(-45deg); opacity: 0; }
        10% { opacity: 1; }
        20% { transform: translate(-500px, 500px) rotate(-45deg); opacity: 0; }
        100% { opacity: 0; }
    }


    /* --- 内容样式 --- */
    .markdown-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px !important;
      background-color: var(--panel-bg);
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      border: var(--panel-border);
      border-radius: 15px;
      box-shadow: var(--panel-glow);
      position: relative;
      z-index: 5;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Audiowide', cursive;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
      margin-top: 1.5em;
    }
    
    h1 {
        background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: none;
        filter: drop-shadow(0 0 5px rgba(255,0,255,0.5));
    }

    p, li, span, div {
      text-shadow: none; 
      color: #ffffff;
      font-weight: 500; 
      line-height: 1.8;
      letter-spacing: 0.5px;
    }

    .markdown-section a {
        color: var(--sun-yellow);
        text-decoration: none;
        position: relative;
        font-weight: bold;
        transition: 0.3s;
        border-bottom: 2px solid transparent;
    }
    .markdown-section a:hover {
        color: var(--neon-cyan);
        text-shadow: 0 0 8px var(--neon-cyan);
        border-bottom: 2px solid var(--neon-cyan);
    }

    .nav-container ul {
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid var(--neon-purple);
        box-shadow: 0 0 15px var(--neon-purple);
        border-radius: 8px;
        padding: 5px;
        backdrop-filter: blur(5px);
    }
    li { color: #fff; }
    
    .nav-container li {
      font-family: 'Press Start 2P', cursive;
      font-size: 10px !important;
      line-height: 1.5;
      color: var(--neon-cyan) !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.2s;
    }
    
    .nav-container li:hover {
      background: var(--neon-pink);
      color: #000 !important;
      box-shadow: 0 0 20px var(--neon-pink);
      transform: scale(1.05);
    }

    .glitch-text {
        position: relative;
        font-family: 'Audiowide', cursive;
        color: white;
        font-size: 35pt;
    }
    .glitch-text::before, .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-deep);
    }
    .glitch-text::before {
        left: 2px;
        text-shadow: -2px 0 var(--neon-pink);
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
    }
    .glitch-text::after {
        left: -2px;
        text-shadow: -2px 0 var(--neon-cyan);
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim2 5s infinite linear alternate-reverse;
    }
    @keyframes glitch-anim {
        0% { clip: rect(12px, 9999px, 32px, 0); }
        50% { clip: rect(64px, 9999px, 80px, 0); }
        100% { clip: rect(4px, 9999px, 20px, 0); }
    }
    @keyframes glitch-anim2 {
        0% { clip: rect(52px, 9999px, 82px, 0); }
        50% { clip: rect(2px, 9999px, 15px, 0); }
        100% { clip: rect(34px, 9999px, 64px, 0); }
    }

    @keyframes typing {
      0% { width: 0; border-color: var(--neon-pink); }
      50% { border-color: var(--neon-cyan); }
      100% { width: 0; border-color: var(--neon-pink); }
    }

    font[size="+3"] {
      cursor: pointer;
      color: var(--neon-pink) !important;
      text-shadow: 2px 2px 0px var(--neon-cyan);
      filter: drop-shadow(0 0 10px var(--neon-purple));
    }
    font[size="+3"]:hover {
       transform: rotate(15deg) scale(1.3);
    }

    .project {
        background-color: var(--card-bg);
        backdrop-filter: blur(var(--card-blur)); 
        -webkit-backdrop-filter: blur(var(--card-blur));
        border: var(--card-border);
        border-left: 4px solid var(--neon-cyan);
        border-radius: 6px;
        padding: 25px;
        margin: 40px 0;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .project:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 40px rgba(0, 243, 255, 0.15);
        border-color: var(--neon-cyan);
    }

    .project-title {
        margin: 0 0 10px 0;
        font-family: 'Audiowide', sans-serif;
        font-size: 1.4rem;
        line-height: 1.4;
        color: #fff;
        text-transform: uppercase;
        text-shadow: 0 0 0px rgba(0, 243, 255, 0.8);
    }
    .project-title h3{
        margin: 0 0 10px 0;
        font-family: 'Audiowide', sans-serif;
        font-size: 1.4rem;
        line-height: 1.4;
        color: #fff;
        text-transform: uppercase;
        text-shadow: 0 0 0px rgba(0, 243, 255, 0.8);
    }
    .project-sub {
        font-family: 'Merriweather', serif;
        font-size: 0.9rem;
        color: #ccc;
        margin-bottom: 15px;
        font-style: italic;
    }

    .project-summary {
        color: #eee;
        line-height: 1.8;
        font-size: 1rem;
        margin-bottom: 15px;
        font-family: 'Merriweather', serif;
    }

    .project-summary span {
        display: inline-block;
        background: rgba(255, 0, 255, 0.15);
        border: 1px solid var(--neon-pink);
        color: var(--neon-pink);
        font-family:'Audiowide', sans-serif;
        font-size: 0.8rem;
        padding: 6px 8px;
        margin-right: 6px;
        margin-bottom: 6px;
        border-radius: 2px;
    }

    .project-details {
        height: 0;
        overflow: hidden;
        opacity: 0;
        visibility: hidden;
        transition: height 0.4s ease, opacity 0.4s ease, margin-top 0.4s ease;
        margin-top: 0;
        border-top: 1px solid transparent;
    }

    .project-details.open {
        opacity: 1;
        visibility: visible;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .project-toggle {
        background: transparent;
        border: 1px solid var(--neon-cyan);
        color: var(--neon-cyan);
        font-family: 'Audiowide', sans-serif;
        font-size: 0.7rem;
        padding: 10px 15px;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 10px;
    }
    .project-toggle:hover {
        background: var(--neon-cyan);
        color: #000;
        box-shadow: 0 0 15px var(--neon-cyan);
    }
    
    .sidebar-toggle { display: none !important; }
    
    .markdown-section img {
        border: 2px solid var(--neon-purple);
        box-shadow: 0 0 10px var(--neon-purple);
        border-radius: 6px;
        max-width: 100%;
        transition: 0.3s;
    }
    .markdown-section img:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px var(--neon-cyan);
        border-color: var(--neon-cyan);
    }
    
    /* 移动端优化：金字塔缩小 */
    @media (max-width: 768px) {
        .pyramid-container { width: 80px; height: 80px; }
        .side { border-left: 40px solid transparent; border-right: 40px solid transparent; border-bottom: 80px solid rgba(0, 243, 255, 0.1); }
    }

  </style>
</head>

  <script>
    window.$docsify = {
      name: "shengqi dang",
      themeColor: "#00f3ff", 
      hideSidebar: true,
      name: '',
      repo: '',
      executeScript: true,
    }
    
    const title = document.querySelector('font[size="+3"]');
    title.addEventListener('click', () => {
        title.style.transform = "rotate(360deg) scale(1.5)";
        setTimeout(() => {
            title.style.transform = "rotate(0deg) scale(1)";
        }, 1000);
    });

    // 项目卡片展开逻辑
    (function(){
      function openDetails(el){
        el.classList.add('open');
        el.style.height = el.scrollHeight + 'px';
        el.setAttribute('aria-hidden','false');
      }
      function closeDetails(el){
        el.style.height = el.scrollHeight + 'px';
        void el.offsetHeight;
        el.style.height = '0px';
        el.classList.remove('open');
        el.setAttribute('aria-hidden','true');
      }

      function toggleDetails(container, details, toggleBtn){
        const isOpen = details.classList.contains('open');
        if(isOpen){
          closeDetails(details);
          toggleBtn.setAttribute('aria-expanded','false');
          toggleBtn.textContent = 'ACCESS DATA / 详情';
        } else {
          document.querySelectorAll('.project-details.open').forEach(openEl=>{
            const parent = openEl.closest('.project');
            const btn = parent && parent.querySelector('.project-toggle');
            if(openEl !== details){ 
                closeDetails(openEl); 
                if(btn){ btn.setAttribute('aria-expanded','false'); btn.textContent = 'ACCESS DATA / 详情'; } 
            }
          });
          openDetails(details);
          toggleBtn.setAttribute('aria-expanded','true');
          toggleBtn.textContent = 'MINIMIZE / 收起 ';
        }
      }

      function initProjectBlock(project){
        if(project.dataset._initProject) return;
        project.dataset._initProject = '1';

        const details = project.querySelector('.project-details');
        if(!details) return;
        if(!details.id){
          details.id = 'proj-' + Math.random().toString(36).slice(2,9);
        }

        let toggleBtn = project.querySelector('.project-toggle');
        if(!toggleBtn){
          toggleBtn = document.createElement('button');
          toggleBtn.className = 'project-toggle';
          toggleBtn.textContent = 'ACCESS DATA / 详情';
          toggleBtn.setAttribute('aria-expanded','false');
          toggleBtn.setAttribute('aria-controls', details.id);
          project.querySelector('.project-header').appendChild(toggleBtn);
        } else {
          toggleBtn.setAttribute('aria-controls', details.id);
          toggleBtn.setAttribute('aria-expanded','false');
        }

        details.style.height = '0px';
        details.setAttribute('aria-hidden','true');

        toggleBtn.addEventListener('click', function(){
          toggleDetails(project, details, toggleBtn);
        });

        toggleBtn.addEventListener('keydown', function(e){
          if(e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar'){
            e.preventDefault(); this.click();
          }
        });

        window.addEventListener('resize', function(){
          if(details.classList.contains('open')){
            details.style.height = details.scrollHeight + 'px';
          }
        });
      }

      function initAllProjects(){
        document.querySelectorAll('.project').forEach(initProjectBlock);
      }

      if(window.$docsify){
        window.$docsify.plugins = window.$docsify.plugins || [];
        window.$docsify.plugins.push(function(hook, vm){
          hook.doneEach(function(){
            initAllProjects();
          });
        });
      } else {
        document.addEventListener('DOMContentLoaded', initAllProjects);
      }
    })();
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
