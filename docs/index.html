<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shengqi Dang - BOLD & GENESIS</title>
    <link rel="icon" href="./1F34E.svg">
    
    <!-- 字体升级：更粗、更清晰、更有力量 -->
    <!-- Playfair Display: 优雅且厚重的衬线体 (用于标题) -->
    <!-- Space Grotesk: 现代科技感无衬线体 (用于正文) -->
    <!-- JetBrains Mono: 代码风格 (用于装饰) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@700&family=Rock+Salt&display=swap" rel="stylesheet">
    
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    
    <style>
    /* --- 核心变量：高对比度白昼模式 --- */
    :root {
        --bg-color: #ffffff;
        --ink-black: #000000; /* 纯黑，极致对比 */
        --text-gray: #222222; /* 深灰，用于正文 */
        --accent-purple: #8e44ad; 
        --accent-acid: #b8e994;
        --line-color: rgba(0, 0, 0, 0.08); /* 网格淡一点，不抢戏 */
        --glass-bg: rgba(255, 255, 255, 0.96);
    }

    /* --- 全局基础 --- */
    body {
        background-color: var(--bg-color);
        min-height: 100vh;
        margin: 0; padding: 0;
        /* 正文改用 Space Grotesk，字重 400，非常清晰 */
        font-family: 'Space Grotesk', sans-serif;
        color: var(--text-gray);
        font-size: 18px; /* 基础字号加大 */
        overflow-x: hidden;
        
        /* 背景：极淡的方格纸纹理 */
        background-image: 
            linear-gradient(var(--line-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    /* =========================================
       背景装饰 (保持酷感，但退后一步)
       ========================================= */

    /* 1. 页面边框框架 */
    .frame-border {
        position: fixed;
        top: 15px; left: 15px; right: 15px; bottom: 15px;
        border: 2px solid var(--ink-black); /* 边框加粗 */
        pointer-events: none;
        z-index: 100;
    }
    /* 四角装饰块 */
    .frame-corner {
        position: fixed; width: 20px; height: 20px; background: var(--ink-black); z-index: 101;
    }
    .fc-tl { top: 15px; left: 15px; }
    .fc-tr { top: 15px; right: 15px; }
    .fc-bl { bottom: 15px; left: 15px; }
    .fc-br { bottom: 15px; right: 15px; background: var(--accent-purple); }

    /* 2. 巨大的背景数字 */
    .bg-number {
        position: fixed;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 30vw;
        line-height: 0.8;
        color: rgba(0,0,0,0.03);
        z-index: -5;
        pointer-events: none;
        user-select: none;
    }
    .num-01 { top: -5%; right: -5%; }
    .num-02 { bottom: -5%; left: -2%; color: rgba(142, 68, 173, 0.04); }

    /* 3. 创世纪线稿 */
    .genesis-sketch {
        position: fixed;
        top: 50%; left: 50%;
        width: 60vw; height: 60vh;
        transform: translate(-50%, -50%);
        background: url('https://upload.wikimedia.org/wikipedia/commons/5/5b/Michelangelo_-_Creation_of_Adam_%28cropped%29.jpg') center/contain no-repeat;
        opacity: 0.12; /* 稍微淡一点，保证文字清晰 */
        filter: grayscale(100%) contrast(1.2);
        mix-blend-mode: multiply;
        z-index: -10;
    }

    /* 4. 侧边装饰信息 */
    .side-info {
        position: fixed;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700; /* 加粗 */
        font-size: 14px;
        color: #000;
        z-index: 90;
        background: #fff;
        padding: 5px 10px;
        border: 1px solid #000;
    }
    .info-left {
        top: 50%; left: -60px;
        transform: rotate(-90deg);
    }
    .info-right {
        top: 50%; right: -50px;
        transform: rotate(90deg);
    }

    /* 5. 几何装饰块 */
    .deco-line {
        position: fixed; top: 0; left: 20%; width: 2px; height: 100vh;
        background: rgba(0,0,0,0.1); z-index: -2;
    }
    .deco-circle {
        position: fixed; top: 15%; left: 12%; width: 150px; height: 150px;
        border: 3px solid var(--accent-purple); border-radius: 50%;
        opacity: 0.3; z-index: -2;
    }

    /* =========================================
       UI 样式 (强调清晰度)
       ========================================= */

    /* --- 导航栏 --- */
    .header-container {
        display: flex; justify-content: center;
        padding: 60px 0; position: relative; z-index: 20;
    }

    .nav-pills ul { 
        display: flex; gap: 20px; list-style: none; 
        background: #fff; padding: 10px 20px;
        border: 2px solid var(--ink-black);
        box-shadow: 5px 5px 0 rgba(0,0,0,0.1);
    }
    
    .nav-pills li { position: relative; }

    .nav-pills center {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700; /* 导航文字加粗 */
        font-size: 1.1rem;
        text-transform: uppercase; color: var(--ink-black);
        padding: 5px 10px;
        transition: 0.2s;
    }
    
    .nav-pills a { text-decoration: none; }
    
    /* 导航 Hover：背景色块 */
    .nav-pills li:hover center {
        background: var(--ink-black);
        color: var(--accent-acid);
        transform: translateY(-2px);
        box-shadow: 3px 3px 0 var(--accent-purple);
    }

    /* --- 标题区域 --- */
    .hero-title {
        text-align: center; margin: 50px auto 80px auto; position: relative; z-index: 10;
    }
    
    .main-title {
        font-family: 'Playfair Display', serif; /* 极粗衬线体 */
        font-weight: 900; /* 最粗字重 */
        font-size: 6rem;
        color: var(--ink-black);
        line-height: 1.1;
        letter-spacing: -2px;
    }
    
    /* 标题下的装饰线 */
    .title-line {
        width: 100px; height: 6px; background: var(--accent-purple);
        margin: 20px auto;
    }

    .subtitle-text {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 1rem;
        color: #000;
        background: var(--accent-acid);
        padding: 5px 15px;
        display: inline-block;
        border: 2px solid #000;
    }

    /* --- 内容区域 --- */
    .markdown-section {
        max-width: 850px;
        margin: 0 auto 100px auto !important;
        padding: 80px !important;
        background: var(--glass-bg);
        border: 3px solid var(--ink-black); /* 边框加粗 */
        box-shadow: 15px 15px 0 rgba(0,0,0,0.15); /* 硬阴影增强立体感 */
        position: relative; z-index: 5;
    }
    
    /* 顶部标签 */
    .markdown-section::before {
        content: "/// READ_MODE: ON";
        position: absolute; top: -15px; left: 20px;
        background: var(--ink-black); color: #fff;
        font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;
        padding: 5px 15px;
    }

    /* Typography (重点优化部分) */
    h1 { 
        font-family: 'Playfair Display', serif; 
        font-weight: 900; 
        font-size: 3.5em; 
        text-align: center; 
        color: var(--ink-black);
        margin-bottom: 0.8em;
        border-bottom: 4px solid var(--ink-black); /* 粗线条 */
        padding-bottom: 10px;
    }
    
    h2 { 
        font-family: 'Space Grotesk', sans-serif; 
        font-weight: 700;
        font-size: 2.2em; 
        color: var(--ink-black);
        margin-top: 1.5em;
        border-left: 8px solid var(--accent-purple);
        padding-left: 15px;
        background: linear-gradient(90deg, rgba(142, 68, 173, 0.1), transparent);
    } 
    
    h3 {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.5em;
        color: #000;
        border-bottom: 2px dashed #ccc;
        padding-bottom: 5px;
    }

    p, li {
        font-family: 'Space Grotesk', sans-serif; 
        font-weight: 400; /* 正常字重，Space Grotesk 即使 400 也很清晰 */
        line-height: 1.8; /* 增加行高，更易读 */
        font-size: 1.2rem; /* 加大正文字号 */
        color: #111; /* 纯黑偏灰，不刺眼但清晰 */
        margin-bottom: 1em;
    }
    
    strong {
        font-weight: 700;
        color: var(--accent-purple);
        background: rgba(142, 68, 173, 0.1);
        padding: 0 2px;
    }
    
    a {
        color: var(--ink-black); 
        text-decoration: none;
        font-weight: 700;
        border-bottom: 3px solid var(--accent-acid); /* 粗下划线 */
        transition: 0.2s;
    }
    a:hover { background: var(--accent-acid); color: #000; }

    /* 引用块 */
    blockquote {
        border-left: 5px solid var(--ink-black);
        background: #f4f4f4;
        margin: 2em 0; padding: 20px 30px;
        font-family: 'Playfair Display', serif; /* 引用用衬线体，更有格调 */
        font-weight: 700;
        font-style: italic;
        font-size: 1.4rem; 
        color: #333;
    }

    /* 按钮 */
    .project-toggle {
        background: #fff;
        border: 3px solid var(--ink-black);
        color: var(--ink-black);
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        padding: 15px 35px;
        cursor: pointer;
        font-size: 1rem;
        box-shadow: 5px 5px 0 var(--ink-black);
        transition: 0.2s;
        margin-top: 10px;
    }
    .project-toggle:hover {
        transform: translate(-3px, -3px);
        box-shadow: 8px 8px 0 var(--accent-purple);
    }

    /* 图片 */
    .markdown-section img {
        border: 3px solid var(--ink-black);
        display: block; margin: 50px auto; max-width: 100%;
        box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
    }

    /* 移动端适配优化 */
    @media screen and (max-width: 768px) {
        .main-title { font-size: 3.5rem; }
        .frame-border { display: none; } /* 手机上隐藏边框，增加空间 */
        .markdown-section { padding: 30px !important; }
        .bg-number { font-size: 50vw; opacity: 0.05; }
    }

    </style>
</head>
<body>

    <!-- 1. 页面边框框架 (加粗版) -->
    <div class="frame-border"></div>

    <div class="frame-corner fc-tr"></div>

    <!-- 2. 背景极大数字 -->
    <div class="bg-number num-01">01</div>

    <!-- 3. 创世纪线稿 -->
    <div class="genesis-sketch"></div>
    <div class="deco-line"></div>
    <div class="deco-circle"></div>

    <!-- 4. 侧边信息 -->
    <div class="side-info info-left"> EVERYTHING: WELL</div>
    <div class="side-info info-right">STATUS: ONLINE</div>

    <header class="header-container">
        <nav class="nav-pills">
            <ul>
                <a href="#/README.md#pub"><li><center>About</center></li></a>
                <a href="#/pub.md#pub"><li><center>Academics</center></li></a>
                <a href="#/proj.md#project"><li><center>Designs</center></li></a>
                <a href="#/works.md#"><li><center>Artworks</center></li></a>
            </ul>
        </nav>
    </header>

    <div class="hero-title">
        <div class="title-wrapper">
            <div class="main-title">To Feel<br>To Dream<br>To Create</div>
        </div>
        <div class="title-line"></div>
        <div class="subtitle-text">/// ///</div>
    </div>

    <div id="app"></div>

    <script>
        window.$docsify = {
            name: "Shengqi Dang",
            themeColor: "#000000",
            hideSidebar: true,
            executeScript: true,
            auto2top: true,
            plugins: [
                function(hook, vm) {
                    hook.doneEach(function() {
                        // 可以在这里添加额外的 JS 逻辑
                    });
                }
            ]
        }

    <script src="init_proj.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
