<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shengqi Dang - Daydreaming</title>
    <link rel="icon" href="./1F34E.svg">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* --- 核心变量 (Doudou / Dream Pop Aesthetic) --- */
        :root {
            /* 🎨 咖啡森林梦境 - 默认 (Palette 1) */
            --bg-base: #f0f9f0; /* 新芽嫩绿 */
            --dream-pink: #ff7b54; /* 朝阳珊瑚 */
            --dream-blue: #00b894; /* 森林新叶 */
            --dream-green: #55efc4; /* 生命清泉 */
            
            /* 🧀 新增 Doudou 元素：暖奶酪色 */
            --doudou-cream: #ffeaa7; /* 向日葵黄 */
            --doudou-shadow: 0 10px 20px rgba(0, 184, 148, 0.25);

            /* 🌫 模糊与光晕 */
            --glass-bg: rgba(240, 249, 240, 0.7); /* 新芽嫩绿 */
            --glass-border: 1px solid rgba(255, 255, 255, 0.85);
            --glass-shadow: var(--doudou-shadow);
            --blur-amount: blur(15px); /* 保持柔和清晰 */

            /* 🖋 字体颜色 */
            --text-main: #2d3436; /* 生命深绿 */
            --text-accent: #00b894; /* 森林新叶 */
            --link-color: #ff7b54; /* 朝阳珊瑚 */
            
            /* 平滑过渡 */
            transition: 
                background-color 0.8s ease-in-out,
                color 0.8s ease-in-out,
                border-color 0.8s ease-in-out,
                box-shadow 0.8s ease-in-out;
        }

        /* Palette 2: 青绿黄调 Doudou */
        .theme-2 {
            --bg-base: #e0ffe0; /* 淡绿色 */
            --dream-pink: #a8e0d0; /* 淡薄荷绿 */
            --dream-blue: #add8e6; /* 浅天蓝 */
            --dream-green: #fffacd; /* 柠檬雪纺 */
            
            --doudou-cream: #fafaae; /* 淡黄色 */
            --doudou-shadow: 0 10px 20px rgba(173, 216, 230, 0.2);

            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: 1px solid rgba(255, 255, 255, 0.9);

            --text-main: #3a5050; /* 深青色 */
            --text-accent: #669999; /* 柔和青色 */
            --link-color: #6aab9c;
        }

        /* Palette 3: 黑白灰 Doudou (带一点点暖调) */
        .theme-3 {
            /* 🎨 迷幻白日梦色板 - 默认 (Palette 1) */
            --bg-base: #fdfbf7; /* 米白纸张色 */
            --dream-pink: #fbc2eb;
            --dream-blue: #a6c1ee;
            --dream-green: #e0c3fc; /* 紫丁香色 */
            
            /* 🧀 新增 Doudou 元素：柔和奶酪色 */
            --doudou-cream: #ffe9a6;
            --doudou-shadow: 0 10px 20px rgba(166, 193, 238, 0.2);

            /* 🌫 模糊与光晕 */
            --glass-bg: rgba(255, 255, 255, 0.6); /* 增加一点透明度 */
            --glass-border: 1px solid rgba(255, 255, 255, 0.8);
            --glass-shadow: var(--doudou-shadow);
            --blur-amount: blur(15px); /* 稍微降低模糊度，让内容更清晰 */

            /* 🖋 字体颜色 */
            --text-main: #4a4a4a; /* 柔和的深灰，不是纯黑 */
            --text-accent: #7b6c96; /* 薰衣草紫 */
            --link-color: #e67e22; /* 暖橙色点缀 */
        }


        /* --- 全局基础 --- */
        body {
            background-color: var(--bg-base);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif; /* 正文用干净的无衬线 */
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.8s ease-in-out, color 0.8s ease-in-out;
        }

        /* 🎞 胶片噪点层 (保持不变，这是 Dream Pop 的灵魂) */
        .film-grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.07;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 🌈 动态极光背景 (保持不变) */
        .aurora-bg {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, var(--dream-pink), transparent 60%),
                        radial-gradient(circle at 20% 80%, var(--dream-blue), transparent 50%),
                        radial-gradient(circle at 80% 20%, var(--dream-green), transparent 50%);
            filter: blur(80px);
            z-index: -1;
            animation: auroraFlow 20s ease-in-out infinite alternate;
            opacity: 0.6;
            transition: background 0.8s ease-in-out, filter 0.8s ease-in-out;
        }
        @keyframes auroraFlow {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(10deg) scale(1.1); }
            100% { transform: rotate(-5deg) scale(1); }
        }

        /* ☁️ 漂浮的光斑 (保持不变，但增加一个 Doudou 颜色) */
        .dream-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            opacity: 0.8;
            animation: floatBlob 15s infinite ease-in-out;
            transition: background 0.8s ease-in-out, filter 0.8s ease-in-out;
        }
        .blob-1 { width: 300px; height: 300px; background: var(--dream-pink); top: 10%; left: 20%; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: var(--dream-blue); bottom: 10%; right: 10%; animation-delay: -5s; }
        .blob-3 { width: 200px; height: 200px; background: var(--doudou-cream); top: 40%; left: 60%; animation-delay: -8s; } /* 换成奶油色 */

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* --- 导航栏 (极简、透明) --- */
        .header-container {
            display: flex;
            justify-content: space-between; /* 以前是 space-between */
            align-items: center;
            padding: 20px 40px;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 20;
        }

        /* 🎀 新增：圆点 Logo (Doudou 元素) - 用于主题切换 */
        .doudou-dot {
            width: 30px; height: 30px;
            background-color: var(--text-accent);
            border-radius: 50%;
            opacity: 0.8;
            transition: all 0.5s ease;
            box-shadow: 0 0 10px var(--text-accent);
            cursor: pointer; /* 添加光标指示可点击 */
        }
        .doudou-dot:hover {
            transform: scale(1.5);
            opacity: 1;
            box-shadow: 0 0 20px var(--text-accent);
        }

        .nav-pills ul {
            display: flex; list-style: none; margin: 0; padding: 0; gap: 30px;
        }
        .nav-pills li {
            position: relative;
            /* 💥 增加 hover/active 时的动画效果基准 */
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* 💥 导航按钮的动画：Q弹效果 */
        .nav-pills li:hover {
            transform: translateY(-3px) scale(1.05);
        }
        .nav-pills li:active {
            transform: translateY(1px) scale(0.98);
        }

        .nav-pills a {
            text-decoration: none;
        }
        .nav-pills center {
            font-family: 'Cormorant Garamond', serif; 
            font-weight: 600; 
            font-size: 1.1rem;
            color: var(--text-main);
            letter-spacing: 2px;
            font-style: italic;
            transition: color 0.3s;
        }
        .nav-pills span {
            display: none; /* 隐藏中文，保持极简 */
        }
        
        /* 导航下划线动画 (改为圆润的胶囊效果，更 Doudou) */
        .nav-pills li::after {
            content: '';
            position: absolute;
            width: 100%; height: 5px; /* 变厚 */
            bottom: -8px; left: 0;
            background-color: var(--doudou-cream); /* 使用奶油色 */
            border-radius: 50px; /* 增加圆角 */
            opacity: 0;
            transform: scaleX(0.5); /* 初始状态是扁平的 */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 弹性动画 */
        }
        .nav-pills li:hover::after { 
            width: 100%; 
            opacity: 1;
            transform: scaleX(1);
        }
        .nav-pills li:hover center { 
            color: var(--text-accent); 
            text-shadow: 0 0 10px rgba(123, 108, 150, 0.5); /* 增强光晕 */
        }

        /* --- 标题区域 (迷幻风格 + Doudou 改进) --- */
        .hero-title {
            text-align: center; 
            margin: 80px auto 60px auto; 
            position: relative; 
            z-index: 10;
        }
        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.5rem; /* 字体增大一点 */
            font-weight: 600; /* 变粗，更像奶油手写体 */
            color: var(--text-main);
            letter-spacing: -2px;
            /* 迷幻重影效果 + 柔和的 Doudou 阴影 */
            text-shadow: 
                5px 5px 0px rgba(251, 194, 235, 0.4), /* 梦幻粉 */
                -5px -5px 0px rgba(166, 193, 238, 0.4), /* 梦幻蓝 */
                0 0 20px var(--doudou-cream); /* 奶油色光晕 */
            animation: breathe 6s infinite ease-in-out;
            transition: text-shadow 0.8s ease-in-out, color 0.8s ease-in-out;
        }
        .subtitle-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem; /* 略微增大 */
            letter-spacing: 5px; /* 略微增大 */
            text-transform: uppercase;
            color: var(--text-accent);
            margin-top: 15px;
            opacity: 0.8;
            font-weight: 400;
            transition: color 0.8s ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.9; filter: blur(0px); transform: scale(1); }
            50% { opacity: 0.7; filter: blur(1px); transform: scale(1.01); } /* 增加微小缩放，更“活泼” */
        }

        /* --- 内容区域 (磨砂玻璃 - Doudou 优化) --- */
        .markdown-section {
            max-width: 800px;
            margin: 0 auto 80px auto !important;
            padding: 50px !important;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-amount);
            -webkit-backdrop-filter: var(--blur-amount);
            border: var(--glass-border);
            border-radius: 20px; /* **Doudou 核心：更大的圆角** */
            box-shadow: var(--glass-shadow);
            position: relative; 
            z-index: 5;
            transition: all 0.5s ease; /* 增加过渡效果 */
        }
        .markdown-section:hover {
             box-shadow: 0 15px 40px rgba(166, 193, 238, 0.3); /* 鼠标悬停时阴影变大 */
        }


        /* 装饰性线条 (改为圆点) */
        .markdown-section:before {
            content: '•'; /* 换成圆点 */
            position: absolute;
            top: 15px; left: 50%; transform: translateX(-50%);
            width: auto; height: auto;
            font-size: 1.5rem;
            color: var(--text-accent);
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .markdown-section:hover:before {
            opacity: 0.8;
        }
        /* --- 💤 趴在内容框上的瞌睡 Doudou --- */
.doudou-perched {
    position: absolute;
    top: -45px; /* 让它刚好坐在框的顶端 */
    right: 60px; /* 距离右边的位置，你可以调整这个值 */
    width: 80px;
    height: 50px;
    background: var(--doudou-cream);
    /* 形状：上面圆润，下面平坦，像一个馒头趴着 */
    border-radius: 50px 50px 10px 10px; 
    box-shadow: 
        inset -5px -5px 10px rgba(0,0,0,0.05), /* 内部立体感 */
        0 -5px 15px rgba(255, 255, 255, 0.5); /* 顶部高光 */
    z-index: 20; /* 保证在内容框之上 */
    transform-origin: bottom center;
    animation: doudouSleepBreathe 4s infinite ease-in-out;
    cursor: pointer; /* 鼠标放上去变小手 */
    transition: transform 0.3s ease;
}

/* 鼠标悬停时，它会惊醒一下 */
.doudou-perched:hover {
    animation: doudouWakeUp 0.5s forwards;
}
.doudou-perched:hover .snot-bubble {
    opacity: 0; /* 惊醒时鼻涕泡破掉 */
    transform: scale(0);
}
.doudou-perched:hover .eye {
    height: 8px; /* 眼睛睁开 */
    border-radius: 50%;
    transform: scaleY(1);
    border: none;
    background-color: var(--text-main);
}

/* 脸部定位 */
.doudou-perched .doudou-face {
    position: absolute;
    top: 55%; /* 脸稍微靠下，显得慵懒 */
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
}

/* 闭着的眼睛 (弧线) */
.doudou-perched .eye {
    position: absolute;
    width: 10px;
    height: 6px;
    background: transparent;
    border-bottom: 2px solid var(--text-accent); /* 用边框做闭眼效果 */
    border-radius: 0;
    top: 15px;
    transition: all 0.3s;
}
.doudou-perched .eye.left { left: 22px; }
.doudou-perched .eye.right { right: 22px; }

/* 腮红 */
.doudou-perched .blush {
    top: 22px;
    width: 10px;
    height: 5px;
}
.doudou-perched .blush.left { left: 18px; }
.doudou-perched .blush.right { right: 18px; }

/* 💤 鼻涕泡 (Snot Bubble) */
.snot-bubble {
    position: absolute;
    top: 10px;
    right: 20px;
    width: 0px;
    height: 0px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    z-index: 25;
    /* 泡泡变大变小的动画 */
    animation: bubbleGrow 4s infinite ease-in-out;
    transform-origin: bottom left;
}

/* --- 动画关键帧 --- */

/* 呼吸：身体微微起伏 */
@keyframes doudouSleepBreathe {
    0%, 100% { transform: scaleY(1) translateY(0); }
    50% { transform: scaleY(1.05) translateY(-2px); } /* 吸气时变高一点 */
}

/* 鼻涕泡忽大忽小 */
@keyframes bubbleGrow {
    0%, 100% { width: 5px; height: 5px; transform: translate(0, 0); opacity: 0.8; }
    50% { width: 25px; height: 25px; transform: translate(10px, -10px); opacity: 0.9; }
}

/* 惊醒动画 */
@keyframes doudouWakeUp {
    0% { transform: scale(1); }
    50% { transform: scale(1.1) translateY(-10px); }
    100% { transform: scale(1) translateY(0); }
}

        /* 标题样式 (保持不变) */
        h1, h2, h3 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-main);
            font-weight: 600;
            border-bottom: none;
            margin-top: 2em;
            transition: color 0.8s ease-in-out, text-shadow 0.8s ease-in-out;
        }
        h1 { 
            font-size: 2.8em; 
            text-align: center; 
            font-style: italic;
            margin-bottom: 1em;
            text-shadow: 2px 2px 0px var(--doudou-cream); /* 给 h1 增加奶酪阴影 */
        }
        h2 {
            font-size: 1.8em;
            position: relative;
            padding-left: 15px;
        }
        h2::before {
            content: '✦';
            position: absolute; left: 0; top: 2px;
            font-size: 0.6em; color: var(--text-accent);
            transition: color 0.8s ease-in-out;
        }

        p, li {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.9;
            font-weight: 300;
            color: #555;
            transition: color 0.8s ease-in-out;
        }

        /* 链接样式 */
        a {
            color: var(--text-accent);
            text-decoration: none;
            border-bottom: 2px solid var(--doudou-cream); /* 使用更厚、更柔和的底线 */
            transition: all 0.3s;
        }
        a:hover {
            color: var(--dream-blue);
            border-bottom: 2px solid var(--dream-blue);
            background: rgba(255,255,255,0.7);
            border-radius: 4px; /* 轻微圆角 */
        }

        /* 🖼️ 图片样式 - 优化为 Doudou 拍立得风格 */
        .markdown-section img {
            /* 1. 拍立得白色边框 */
            border: 8px solid #fff;
            /* 2. 柔和的阴影 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.12); 
            /* 3. 增加过渡效果 */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
            display: block;
            margin: 30px auto;
            max-width: 90%;
            /* 4. **核心：更明显的圆角**，模拟拍立得或贴纸的圆润边角 */
            border-radius: 18px; 
            /* 确保图片本身也遵守圆角 */
            overflow: hidden; 
        }
        .markdown-section img:hover {
            /* 悬停动画：Q弹旋转 */
            transform: scale(1.05) rotate(2deg); /* 略微夸张的放大和旋转 */
            box-shadow: 0 15px 45px rgba(0,0,0,0.2); /* 阴影变深 */
        }

        /* 按钮 - 柔和胶囊 (保持不变，已是 Doudou 风格) */
        .project-toggle {
            background: #fff;
            border: 1px solid var(--text-accent);
            color: var(--text-accent);
            font-family: 'Montserrat', sans-serif;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;

        }
        .project-toggle:hover {
            background: var(--text-accent);
            color: #fff;
            box-shadow: 0 5px 15px rgba(123, 108, 150, 0.3);
        }
        
        ::selection {
            background: var(--dream-pink);
            color: #fff;
        }
        /* --- Preloader 样式修改 --- */

/* --- 🌟 全屏 Doudou 加载遮罩样式 --- */

/* 1. 全屏容器：完全遮挡网页 */
#doudou-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--bg-base); /* 与网页背景一致，或者用 var(--doudou-cream) */
    z-index: 9999; /* 确保在最顶层 */
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out, background-color 0.8s ease-in-out;
}

/* 2. 核心豆豆容器 */
.doudou-wrapper {
    text-align: center;
    position: relative;
}

/* 3. 大豆豆主体 (云朵般柔软的形状) */
.big-doudou {
    width: 120px;
    height: 100px;
    background: linear-gradient(135deg, #fff 0%, var(--dream-pink) 100%);
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; /* 不规则圆润形状 */
    box-shadow: 
        0 10px 30px rgba(251, 194, 235, 0.4),
        inset -5px -5px 10px rgba(0,0,0,0.05);
    margin: 0 auto 30px auto;
    position: relative;
    animation: doudouFloat 3s infinite ease-in-out, doudouSquish 4s infinite ease-in-out;
    transition: background 0.8s ease-in-out, box-shadow 0.8s ease-in-out;
}

/* 4. 豆豆的表情 (Face) */
.doudou-face {
    position: relative;
    top: 40%;
    width: 100%;
    height: 100%;
}

/* 眼睛 */
.eye {
    position: absolute;
    width: 8px;
    height: 8px;
    background-color: var(--text-accent);
    border-radius: 50%;
    top: 0;
    animation: blink 4s infinite;
    transition: background-color 0.8s ease-in-out;
}
.eye.left { left: 35px; }
.eye.right { right: 35px; }

/* 腮红 */
.blush {
    position: absolute;
    width: 12px;
    height: 6px;
    background-color: var(--dream-pink); /* 使用 dream-pink */
    border-radius: 50%;
    top: 12px;
    opacity: 0.6;
    transition: background-color 0.8s ease-in-out;
}
.blush.left { left: 28px; }
.blush.right { right: 28px; }

/* 嘴巴 (微笑) */
.mouth {
    position: absolute;
    width: 10px;
    height: 5px;
    border-bottom: 2px solid var(--text-accent);
    border-radius: 0 0 10px 10px; /* 半圆 */
    left: 50%;
    transform: translateX(-50%);
    top: 8px;
    transition: border-color 0.8s ease-in-out;
}

/* 5. 加载文字 */
.loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: var(--text-accent);
    letter-spacing: 2px;
    font-style: italic;
    opacity: 0;
    animation: textFadeIn 2s ease-in-out infinite alternate;
    transition: color 0.8s ease-in-out;
}

/* --- 动画定义 --- */

/* 漂浮 */
@keyframes doudouFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

/* 柔软挤压 (Q弹感) */
@keyframes doudouSquish {
    0%, 100% { border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; }
    50% { border-radius: 45% 45% 50% 50% / 55% 55% 45% 45%; } /* 稍微变扁一点 */
}

/* 眨眼 */
@keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
}

/* 文字淡入淡出 */
@keyframes textFadeIn {
    0% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* --- 消失时的状态类 --- */
#doudou-overlay.hide-overlay {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    /* 可选：添加一个向上移动消失的效果 */
    /* transform: translateY(-20px); */ 
}

/* --- 🧸 Doudou 浮动玩偶 (右下角) --- */

/* --- 🧸 右下角拿花的 Doudou --- */

.doudou-float-container {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 100;
    pointer-events: none; /* 容器不挡鼠标 */
}

/* 这里的样式大部分继承自之前的 float-item，但做了针对性修改 */
.doudou-holding-flower {
    width: 70px;
    height: 60px;
    background: var(--doudou-cream);
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
    box-shadow: 
        5px 5px 15px rgba(0, 0, 0, 0.05),
        inset -5px -5px 10px rgba(0,0,0,0.05),
        0 -5px 10px rgba(255,255,255,0.8);
    position: relative;
    pointer-events: auto; /* Doudou 可以被点击 */
    cursor: pointer;
    /* 身体轻微上下浮动 */
    animation: floatBob 5s infinite ease-in-out;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* 悬停时稍微放大并歪头 */
.doudou-holding-flower:hover {
    transform: scale(1.1) rotate(-5deg);
}

/* --- 脸部微调 --- */
.doudou-holding-flower .doudou-face {
    position: absolute;
    top: 45%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; height: 100%;
}
.doudou-holding-flower .eye {
    position: absolute;
    width: 5px; height: 5px;
    background: var(--text-main);
    border-radius: 50%;
    top: 15px;
    animation: blink 4s infinite;
}
.doudou-holding-flower .eye.left { left: 20px; }
.doudou-holding-flower .eye.right { right: 20px; }

.doudou-holding-flower .blush {
    position: absolute;
    width: 8px; height: 4px;
    background: var(--dream-pink);
    border-radius: 50%;
    top: 22px;
    opacity: 0.5;
}
.doudou-holding-flower .blush.left { left: 15px; }
.doudou-holding-flower .blush.right { right: 15px; }

.doudou-holding-flower .mouth {
    position: absolute;
    width: 6px; height: 3px;
    border-bottom: 2px solid var(--text-main);
    border-radius: 50%;
    left: 50%; transform: translateX(-50%);
    top: 22px;
}

/* --- ✏️ 简笔画手臂 --- */
.arm-left, .arm-right {
    position: absolute;
    width: 12px;
    height: 12px;
    border-bottom: 2px solid var(--text-main); /* 只有底边，像个U型 */
    border-left: 2px solid var(--text-main);   /* 和左边 */
    border-radius: 0 0 0 10px; /* 圆角 */
    opacity: 0.6;
    bottom: 15px;
}

.arm-left {
    left: 18px;
    bottom:10px;
    transform: rotate(-20deg); /* 左手自然下垂 */
}

.arm-right {
    right: 14px;
    bottom: 16px;
    transform: rotate(160deg); /* 右手举起来拿花 */
    width: 10px; height: 10px;
}

/* --- 🌻 小花束 --- */
.flower-bouquet {
    position: absolute;
    right: 8px; /* 花的位置在右手附近 */
    bottom: 25px;
    width: 20px; height: 30px;
    transform-origin: bottom center;
    animation: flowerSway 3s infinite ease-in-out; /* 花朵独立摇摆 */
}

/* 花茎 */
.flower-stem {
    position: absolute;
    bottom: 0; left: 50%;
    width: 2px; height: 15px;
    background-color: #6ab04c; /* 茎的绿色 */
    transform: translateX(-50%);
}
/* 叶子 */
.flower-stem::after {
    content: '';
    position: absolute;
    top: 5px; right: -4px;
    width: 4px; height: 2px;
    background-color: #6ab04c;
    border-radius: 50%;
    transform: rotate(-30deg);
}

/* 花蕊 */
.flower-center {
    position: absolute;
    top: 0; left: 50%;
    width: 6px; height: 6px;
    background-color: #f9ca24; /* 黄色花蕊 */
    border-radius: 50%;
    transform: translateX(-50%);
    z-index: 2;
}

/* 花瓣 (利用 box-shadow 生成一圈) */
.flower-petals {
    position: absolute;
    top: -2px; left: 50%;
    width: 4px; height: 4px;
    background-color: var(--dream-pink); /* 花瓣颜色跟随主题 */
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: 
        0 -5px 0 var(--dream-pink),
        4px -3px 0 var(--dream-pink),
        4px 3px 0 var(--dream-pink),
        0 5px 0 var(--dream-pink),
        -4px 3px 0 var(--dream-pink),
        -4px -3px 0 var(--dream-pink);
    z-index: 1;
}

/* --- 动画定义 --- */
@keyframes floatBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

@keyframes flowerSway {
    0%, 100% { transform: rotate(15deg); }
    50% { transform: rotate(30deg); } /* 花轻轻摇晃 */
}

@keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
}


/* 单个玩偶样式 */
.doudou-float-item {
    width: 60px; /* 尺寸比加载动画的小 */
    height: 50px;
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;

}


/* 小玩偶的表情 */

    <script>
        // Theme switching logic
        const themeSwitcher = document.getElementById('theme-switcher');
        const body = document.body;
        let currentTheme = 1; // Start with the default theme

        themeSwitcher.addEventListener('click', () => {
            currentTheme++;
            if (currentTheme > 3) {
                currentTheme = 1; // Loop back to the first theme
            }

            // Remove existing theme classes
            body.classList.remove('theme-1', 'theme-2', 'theme-3');
            // Add the new theme class
            body.classList.add(`theme-${currentTheme}`);

            // CSS variables (like --doudou-cream) for the floating dolls will automatically update
        });

        // Preloader logic
        window.addEventListener('load', function() {
            const overlay = document.getElementById('doudou-overlay');
            
            if (overlay) {
                setTimeout(() => {
                    overlay.classList.add('hide-overlay');
                    
                    setTimeout(() => {
                        overlay.remove();
                    }, 500); // This time should match CSS transition time (0.5s)
                }, 500); 
            }
        });
    </script>
