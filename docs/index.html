  <style>
    /* --- 开始：落叶动画样式 --- */

    #leaf-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1; 
        overflow: hidden;
    }

    .falling-leaf {
        position: absolute;
        top: -150px; 
        display: block;
        animation: leaf-fall-1 20s linear infinite;
        will-change: transform, opacity;
    }

    .leaf-svg {
        width: 100%;
        height: 100%;
        /* 调整阴影使其更自然，强调立体感 */
        filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.25)); 
        overflow: visible;
    }
    
    @keyframes leaf-fall-1 {
        0% { transform: translate3d(0, 0, 0) rotateZ(0deg) rotateX(0deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate3d(30px, 110vh, 0) rotateZ(360deg) rotateX(180deg); opacity: 0; }
    }

    @keyframes leaf-fall-2 {
        0% { transform: translate3d(0, 0, 0) rotateZ(45deg); opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translate3d(-40px, 115vh, 0) rotateZ(-180deg) rotateY(180deg); opacity: 0; }
    }

    @keyframes leaf-fall-3 {
        0% { transform: translate3d(0, 0, 0) rotateZ(0deg); opacity: 0; }
        20% { opacity: 1; transform: translate3d(20px, 30vh, 0) rotateZ(45deg); }
        50% { transform: translate3d(-20px, 60vh, 0) rotateZ(-30deg); }
        80% { opacity: 1; }
        100% { transform: translate3d(10px, 110vh, 0) rotateZ(90deg); opacity: 0; }
    }
    
    body[data-theme="dark"] .leaf-svg {
         filter: brightness(0.7) drop-shadow(3px 5px 8px rgba(0,0,0,0.5));
    }
    /* --- 结束：落叶动画样式 --- */


    /* --- 文字内容样式 --- */
    h1, h2, h3, h4, h5, h6, span, font, div, p, li, a {
      font-family: 'Merriweather', serif;

      filter: drop-shadow(2px 2px 4px rgba(255,255,255));

      z-index: 2; 
    }

        linear-gradient(45deg, 
            #FFF5D6 0%,     
            #ffffff 50%,    
            #E6F3FF 100%    
        ) fixed;
    background-blend-mode: multiply, normal;
        
    margin-top: 0;
    padding-top: 0;
    transition: all 0.2s ease-in-out;
    font-family: 'Merriweather', serif;
    font-size: 9pt;
    color: var(--text-color);
    overflow-x: hidden; 
}

li {

@keyframes typing {
  0% { width: 0; }
  30% { width: 9ch; }
  80% { width: 9ch; }
  90% { width: 0; }
  100% { width: 0; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

body > * {
  animation: fadeIn 0.8s ease-out forwards;
  opacity: 0;
}

body > div:nth-child(1) { animation-delay: 0.4s; }
body > div:nth-child(2) { animation-delay: 0.6s; }
body > div:nth-child(3) { animation-delay: 0.8s; }
.markdown-section * { 
  animation: fadeIn 0.8s ease-out forwards;
}


a.mode {
  font-size: 36px !important;
}
@keyframes morphEffect {
  0% { transform: rotate(0deg) scale(1); opacity: 1; }
  50% { transform: rotate(180deg) scale(1.2); opacity: 0.5; }
  100% { transform: rotate(360deg) scale(1); opacity: 1; }
}
font[size="+3"]:hover {
  transform: scale(1.15);
  filter: drop-shadow(2px 2px 4px rgba(255,255,255));
  cursor: pointer;
}
font[size="+3"] {
  cursor: pointer;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  z-index: 100; 
}
font[size="+3"]::before {
  position: absolute;
  animation: morphEffect 1.2s ease-in-out forwards;
  opacity: 0;
}

font[size="+3"].active::before {
  opacity: 1;
}

 /* project card */

/* details */
.project-details{overflow:hidden;height:0;transition:height 320ms ease, opacity 250ms ease;padding:0 0;opacity:0}
.project-details.open{opacity:1;padding:12px 0 0 0}

.md-carousel{margin:10px 0}
.md-slide{min-width:100%}

@media (max-width:600px){
  .md-slide img{height:200px}
  .project-title{font-size:1rem}
}
:root{
  --frost-blur: 6px;
  --frost-bg-light: rgba(255,255,255,0.38);
  --frost-bg-dark: rgba(12,12,18,0.36);
  --frost-border: rgba(255,255,255,0.08);
  --frost-padding: 10px;
}

.frost {
  backdrop-filter: blur(var(--frost-blur));
  -webkit-backdrop-filter: blur(var(--frost-blur));
  background-clip: padding-box; 
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(12,12,20,0.06);
  border: 1px solid var(--frost-border);
  padding: var(--frost-padding);
  background-color: var(--frost-bg-light);
  transition: background-color 200ms ease, backdrop-filter 200ms ease, opacity 160ms ease;
  will-change: backdrop-filter, background-color, transform;
  position: relative;
  z-index: 5;
}

body[data-theme="dark"] .frost {
  background-color: var(--frost-bg-dark);
  border: 1px solid rgba(0,0,0,0.28);
}

  <script>
    window.$docsify = {
      name: "shengqi dang",
      themeColor: "#42b983",
      hideSidebar: true,
      name: '',
      repo: '',
    }
    const title = document.querySelector('font[size="+3"]');
  let isButterfly = true;
  
  title.addEventListener('click', () => {
    title.classList.toggle('active');
    isButterfly = !isButterfly;
    });
    let isDark = false;
    document.body.style.setProperty('--text-color', isDark ? 'rgb(240,240, 150)':'rgb(63, 55, 90)');
    document.body.style.setProperty('--bg-color', isDark ? 'rgb(30,30,30)' : 'rgb(250,230,200)');
  document.body.style.backgroundSize = 'cover, cover';
  document.body.style.backgroundRepeat = 'no-repeat, no-repeat';
  document.body.style.backgroundBlendMode = isDark ? 'multiply, screen' : 'multiply, normal';
  
  document.querySelector('a[class="mode"]').addEventListener('click', () => {
  isDark = !isDark;
  if(isDark){
  document.querySelector('a[class="mode"]').innerHTML = '<center>☀️</center>';
}
else{
  document.querySelector('a[class="mode"]').innerHTML = '<center>🔅</center>';
}
  document.body.style.setProperty('--text-color', isDark ? 'rgb(240,240, 150)':'rgb(63, 55, 90)');
  document.body.style.setProperty('--bg-color', isDark ? 'rgb(30,30,30)' : 'rgb(250,230,200)');
  document.body.style.backgroundSize = 'cover, cover';
  document.body.style.backgroundBlendMode = isDark ? 'multiply, screen' : 'multiply, normal';
    });

    (function(){
  function openDetails(el){
    el.classList.add('open');
    el.style.height = el.scrollHeight + 'px';
    el.setAttribute('aria-hidden','false');
  }
  function closeDetails(el){
    el.style.height = el.scrollHeight + 'px';
    void el.offsetHeight;
    el.style.height = '0px';
    el.classList.remove('open');
    el.setAttribute('aria-hidden','true');
  }

  function toggleDetails(container, details, toggleBtn){
    const isOpen = details.classList.contains('open');
    if(isOpen){
      closeDetails(details);
      toggleBtn.setAttribute('aria-expanded','false');
      toggleBtn.textContent = ' About More /详情';
    } else {
      document.querySelectorAll('.project-details.open').forEach(openEl=>{
        const parent = openEl.closest('.project');
        const btn = parent && parent.querySelector('.project-toggle');
        if(openEl !== details){ closeDetails(openEl); if(btn){ btn.setAttribute('aria-expanded','false'); btn.textContent = 'About More /详情'; } }
      });
      openDetails(details);
      toggleBtn.setAttribute('aria-expanded','true');
      toggleBtn.textContent = 'Hide /收起 ';
    }
  }

  function initProjectBlock(project){
    if(project.dataset._initProject) return;
    project.dataset._initProject = '1';

    const details = project.querySelector('.project-details');
    if(!details) return;
    if(!details.id){
      details.id = 'proj-' + Math.random().toString(36).slice(2,9);
    }

    let toggleBtn = project.querySelector('.project-toggle');
    if(!toggleBtn){
      toggleBtn = document.createElement('button');
      toggleBtn.className = 'project-toggle';
      toggleBtn.textContent = 'About More /详情';
      toggleBtn.setAttribute('aria-expanded','false');
      toggleBtn.setAttribute('aria-controls', details.id);
      project.querySelector('.project-header').appendChild(toggleBtn);
    } else {
      toggleBtn.setAttribute('aria-controls', details.id);
      toggleBtn.setAttribute('aria-expanded','false');
    }

    details.style.height = '0px';
    details.setAttribute('aria-hidden','true');

    toggleBtn.addEventListener('click', function(){
      toggleDetails(project, details, toggleBtn);
    });

    toggleBtn.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar'){
        e.preventDefault(); this.click();
      }
    });

    window.addEventListener('resize', function(){
      if(details.classList.contains('open')){
        details.style.height = details.scrollHeight + 'px';
      }
    });
  }


  function initAllProjects(){
    document.querySelectorAll('.project').forEach(initProjectBlock);
  }


  if(window.$docsify){
    window.$docsify.plugins = window.$docsify.plugins || [];
    window.$docsify.plugins.push(function(hook, vm){
      hook.doneEach(function(){
        initAllProjects();
      });
    });
  } else {

    document.addEventListener('DOMContentLoaded', initAllProjects);
  }
})();
  </script>

  <script>
    (function() {
        const leafContainer = document.getElementById('leaf-container');
        
        const leafColors = [
            '#e67e22', '#d35400', '#f1c40f', '#c0392b', '#b7956d', '#eebb99',
            '#a0522d', '#8b4513', '#d2691e', '#ff7f50' // 增加一些大地色和橙红色系
        ];
        
        const leafShapes = [
            // 枫叶状
            {
                viewBox: "0 0 100 100",
                path: "M50,5 C45,25 25,30 10,25 C15,45 5,60 25,70 C20,85 40,95 50,85 C60,95 80,85 75,70 C95,60 85,45 90,25 C75,30 55,25 50,5 Z"
            },
            // 橡树叶状/波浪状
            {
                viewBox: "0 0 100 100",
                path: "M50,0 C60,20 80,25 70,40 C90,50 85,70 65,75 C60,100 40,100 35,75 C15,70 10,50 30,40 C20,25 40,20 50,0 Z"
            },
            // 简单阔叶
            {
                viewBox: "0 0 100 100",
                path: "M50,0 C80,20 90,60 50,100 C10,60 20,20 50,0 Z"
            }
        ];

        function createLeaf() {
            const leaf = document.createElement('div');
            leaf.className = 'falling-leaf';

            const shape = leafShapes[Math.floor(Math.random() * leafShapes.length)];
            const color = leafColors[Math.floor(Math.random() * leafColors.length)];
            
            const size = Math.random() * 50 + 50; 
            
            const randPos = Math.random();
            let startLeft;
            
            if (randPos < 0.5) {
                // 左侧 0% 到 15% 之间
                startLeft = Math.random() * 15;
            } else {
                // 右侧 85% 到 100% 之间
                startLeft = Math.random() * 15 + 85;
            }

            const duration = Math.random() * 15 + 20; 
            const delay = Math.random() * -30; 
            const animationName = `leaf-fall-${Math.floor(Math.random() * 3) + 1}`;

            leaf.style.width = `${size}px`;
            leaf.style.height = `${size}px`;
            leaf.style.left = `${startLeft}vw`;
            
            leaf.style.animationName = animationName;
            leaf.style.animationDuration = `${duration}s`;
            leaf.style.animationDelay = `${delay}s`;

            let svgContent = `
                <svg class="leaf-svg" viewBox="${shape.viewBox}" xmlns="http://www.w3.org/2000/svg">
                    <path d="${shape.path}" fill="url(#leaf-texture-pattern)"/>
                    
                    <path d="${shape.path}" fill="${color}" fill-opacity="0.5" style="mix-blend-mode: multiply;"/>
                </svg>
            `;
            
            leaf.innerHTML = svgContent;
            leafContainer.appendChild(leaf);
        }

        for (let i = 0; i < 20; i++) {
            createLeaf();
        }
    })();
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
