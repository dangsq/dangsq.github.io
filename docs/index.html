<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shengqi Dang | Dreamscape</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    
    <style>
    /* =========================================
       THEME VARIABLES (梦境变量系统)
       ========================================= */
    
    :root {
        /* 背景氛围色 - 柔和清晨 */
        --bg-gradient-1: #e0c3fc;
        --bg-gradient-2: #8ec5fc;
        --bg-gradient-3: #fdfbfb;
        
        /* 玻璃卡片颜色 */
        --glass-bg: rgba(255, 255, 255, 0.55);
        --glass-border: rgba(255, 255, 255, 0.6);
        --glass-shadow: rgba(142, 197, 252, 0.25);
        
        /* 文字颜色 */
        --text-primary: #2c3e50;
        --text-secondary: #546e7a;
        --accent-color: #6a89cc; /* 柔和蓝紫 */
        --accent-glow: rgba(106, 137, 204, 0.5);

        /* 字体 */
        --font-title-main: 'Cinzel Decorative', cursive;
        --font-title-sub: 'Cormorant Garamond', serif;
        --font-body: 'Montserrat', sans-serif;
    }

    [data-theme="personal"] {
        /* 背景氛围色 - 神秘午夜 */
        --bg-gradient-1: #240b36;
        --bg-gradient-2: #c31432;
        --bg-gradient-3: #1a2a6c;
        
        /* 玻璃卡片颜色 */
        --glass-bg: rgba(20, 20, 40, 0.65);
        --glass-border: rgba(255, 255, 255, 0.15);
        --glass-shadow: rgba(0, 0, 0, 0.4);
        
        /* 文字颜色 */
        --text-primary: #e0e0e0;
        --text-secondary: #b0bec5;
        --accent-color: #ff9ff3; /* 梦幻粉 */
        --accent-glow: rgba(255, 159, 243, 0.6);
    }

    /* =========================================
       GLOBAL & BACKGROUND
       ========================================= */
    body {
        min-height: 100vh;
        margin: 0; padding: 0;
        font-family: var(--font-body);
        color: var(--text-primary);
        font-size: 17px;
        line-height: 1.7;
        overflow-x: hidden;
        background: var(--bg-gradient-3);
    }

    .dream-background {
        position: fixed;
        top: -50%; left: -50%; right: -50%; bottom: -50%;
        width: 200%; height: 200%;
        background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-1));
        background-size: 400% 400%;
        z-index: -10;
        animation: gradientBG 25s ease infinite;
        filter: blur(80px);
        opacity: 0.8;
        transition: all 1.5s ease;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* =========================================
       NEW: NATURE & SPRITE ELEMENTS
       ========================================= */

    /* 1. 精灵 (Dream Wisps) */
    .wisp-container {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: -2;
        overflow: hidden;
    }

    .wisp {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, #fff 10%, var(--accent-color) 60%, transparent 100%);
        box-shadow: 0 0 20px var(--accent-glow);
        opacity: 0;
        animation: floatWisp linear infinite;
    }

    @keyframes floatWisp {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0.8; }
        100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
    }

    /* 2. 生长藤蔓 (Growing Vines) */
    .vine-decoration {
        position: fixed;
        bottom: 0;
        pointer-events: none;
        z-index: -1;
        width: 400px;
        height: 400px;
        opacity: 0.6;
        transition: all 1s ease;
    }
    
    .vine-left { left: -50px; bottom: -50px; transform: rotate(10deg); }
    .vine-right { right: -50px; bottom: -50px; transform: scaleX(-1) rotate(10deg); }

    .vine-path {
        fill: none;
        stroke: var(--accent-color);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 1000; /* 足够覆盖路径长度 */
        stroke-dashoffset: 1000; /* 初始隐藏 */
        animation: growVine 4s ease-out forwards;
        filter: drop-shadow(0 0 5px var(--accent-glow));
    }

    /* 不同的藤蔓部分有不同的延迟，制造生长感 */
    .vine-path.delay-1 { animation-delay: 0.5s; }
    .vine-path.delay-2 { animation-delay: 1.2s; }

    @keyframes growVine {
        to { stroke-dashoffset: 0; }
    }

    /* 个人模式下藤蔓发光更强 */
    [data-theme="personal"] .vine-path {
        stroke-width: 3;
        filter: drop-shadow(0 0 15px var(--accent-color));
    }


    /* =========================================
       COMPONENTS (GLASSMORPHISM)
       ========================================= */
    
    .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(16px) saturate(120%);
        -webkit-backdrop-filter: blur(16px) saturate(120%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 var(--glass-shadow);
        border-radius: 20px;
        transition: all 0.5s ease;
    }

    .header-container {
        position: fixed;
        top: 30px; left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        width: auto;
        max-width: 90%;
    }

    .nav-pills ul { 
        display: flex; gap: 10px; list-style: none; margin: 0; padding: 8px;
    }
    
    .nav-pills a { text-decoration: none; }

    .nav-pills center {
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 1px;
        color: var(--text-primary);
        padding: 10px 25px;
        border-radius: 50px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }
    
    .nav-pills li:hover center {
        background: var(--accent-color);
        color: #fff;
        box-shadow: 0 0 15px var(--accent-glow);
    }

    .mode-switcher {
        position: fixed;
        top: 40px; right: 40px;
        z-index: 200;
    }

    .switch-btn {
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 12px;
        padding: 12px 24px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-primary);
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 50px;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px var(--glass-shadow);
        transition: all 0.4s ease;
        outline: none;
    }

    .switch-btn:hover {
        background: var(--accent-color);
        color: #fff;
        box-shadow: 0 0 25px var(--accent-glow);
        transform: translateY(-2px);
    }
    
    .hero-title {
        text-align: center; margin: 160px auto 60px auto; position: relative; z-index: 10;
        padding: 0 20px;
    }
    
    .main-title {
        font-family: var(--font-title-main);
        font-weight: 400;
        font-size: 5.5rem;
        color: var(--text-primary);
        line-height: 1.2;
        text-shadow: 2px 2px 10px var(--glass-shadow);
        transition: color 0.5s ease;
        margin-bottom: 30px;
    }
    
    .main-title::after {
        content: ''; display: block;
        width: 120px; height: 3px;
        background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
        margin: 40px auto 0 auto;
        border-radius: 2px;
        opacity: 0.7;
    }

    .subtitle-text {
        font-family: var(--font-title-sub);
        font-style: italic;
        font-size: 1.8rem;
        color: var(--text-secondary);
        letter-spacing: 1px;
        display: inline-block;
        position: relative;
        padding: 0 20px;
    }
    
    .subtitle-text::before, .subtitle-text::after {
        content: '✧';
        color: var(--accent-color);
        position: absolute; top: 50%;
        transform: translateY(-50%);
        font-size: 1.2rem;
    }
    .subtitle-text::before { left: -10px; }
    .subtitle-text::after { right: -10px; }

    .markdown-section {
        max-width: 900px;
        margin: 0 auto 120px auto !important;
        padding: 80px 100px !important;
        background: var(--glass-bg) !important;
        backdrop-filter: blur(20px) saturate(120%);
        -webkit-backdrop-filter: blur(20px) saturate(120%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 20px 40px 0 var(--glass-shadow);
        border-radius: 30px;
        position: relative; z-index: 5;
        transition: all 0.5s ease;
    }

    .markdown-section::before {
        content: attr(data-mode-label);
        position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
        background: var(--accent-color); color: #fff;
        font-family: var(--font-body); font-weight: 700; font-size: 12px; letter-spacing: 2px;
        padding: 8px 25px;
        border-radius: 20px;
        box-shadow: 0 5px 15px var(--accent-glow);
        transition: all 0.5s ease;
        white-space: nowrap;
    }

    h1, h2, h3, h4, h5, h6 { 
        font-family: var(--font-title-sub); 
        color: var(--text-primary) !important; 
        font-weight: 600;
        margin-top: 1.5em;
    }
    h1 { font-size: 2.8rem; text-align: center; border: none; }
    h2 { font-size: 2.2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
    
    p, li { color: var(--text-secondary) !important; font-weight: 400; }
    
    strong {
        color: var(--accent-color);
        font-weight: 600;
    }
    
    .markdown-section a {
        color: var(--accent-color) !important;
        text-decoration: none;
        border-bottom: 1px dotted var(--accent-color);
        transition: all 0.3s ease;
        font-weight: 600;
    }
    .markdown-section a:hover {
        border-bottom: 1px solid var(--accent-color);
        text-shadow: 0 0 8px var(--accent-glow);
    }

    blockquote {
        border-left: 4px solid var(--accent-color);
        background: rgba(255,255,255, 0.1) !important;
        color: var(--text-secondary) !important;
        border-radius: 0 10px 10px 0;
        margin: 2em 0;
        padding: 20px 30px;
        font-family: var(--font-title-sub);
        font-style: italic;
        font-size: 1.1em;
    }
    
    pre {
        background: rgba(0,0,0,0.05) !important;
        border-radius: 15px;
        border: 1px solid var(--glass-border);
    }
    [data-theme="personal"] pre {
        background: rgba(0,0,0,0.3) !important;
    }

    @media screen and (max-width: 768px) {
        .main-title { font-size: 3.5rem; margin-top: 140px;}
        .subtitle-text { font-size: 1.4rem; }
        .mode-switcher { top: 20px; right: 20px; }
        .switch-btn { padding: 8px 16px; font-size: 10px; }
        .header-container { top: 80px; width: 95%; }
        .nav-pills ul { flex-wrap: wrap; justify-content: center; }
        .nav-pills center { padding: 8px 15px; font-size: 0.85rem; }
        .markdown-section { padding: 40px 30px !important; margin-top: 40px; border-radius: 20px;}
        .vine-decoration { width: 200px; height: 200px; } /* 移动端缩小藤蔓 */
    }

    </style>
</head>
<body>

    <div class="dream-background"></div>
    
    <!-- 精灵容器 -->
    <div class="wisp-container" id="wisp-container"></div>

    <!-- 左下角藤蔓 SVG -->
    <svg class="vine-decoration vine-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- 主枝干 -->
        <path class="vine-path" d="M0,200 Q50,150 40,100 T80,50 T120,20" fill="none" />
        <!-- 分支 1 -->
        <path class="vine-path delay-1" d="M40,100 Q10,80 20,60" fill="none" />
        <!-- 分支 2 -->
        <path class="vine-path delay-2" d="M80,50 Q110,40 130,60" fill="none" />
        <!-- 卷须 -->
        <path class="vine-path delay-1" d="M20,60 C10,50 30,40 25,55" fill="none" />
    </svg>

    <!-- 右下角藤蔓 SVG (通过CSS镜像翻转) -->
    <svg class="vine-decoration vine-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path class="vine-path" d="M0,200 Q50,150 40,100 T80,50 T120,20" fill="none" />
        <path class="vine-path delay-1" d="M40,100 Q10,80 20,60" fill="none" />
        <path class="vine-path delay-2" d="M80,50 Q110,40 130,60" fill="none" />
        <path class="vine-path delay-1" d="M20,60 C10,50 30,40 25,55" fill="none" />
    </svg>

    <div class="mode-switcher">
        <button class="switch-btn" id="modeBtn" onclick="toggleModeWithJump()">
            Switch Realm
        </button>
    </div>

    <header class="header-container">
        <nav class="nav-pills glass-card">
            <ul id="nav-list">
                </ul>
        </nav>
    </header>

    <div class="hero-title">
        <div class="main-title" id="hero-text">Calculating Dream...</div>
        <div class="subtitle-text" id="sub-text">Loading reality construct</div>
    </div>

    <div id="app"></div>

    <script>
        // --- 配置数据 ---
        const config = {
            academic: {
                modeName: 'academic',
                theme: 'academic',
                heroText: 'The Rational Dreamer',
                subText: 'Exploring structures, data, and design.',
                statusText: 'REALM: ACADEMIC',
                readLabel: '✧ CURRENT REALM: RATIONALITY ✧',
                btnText: 'Enter Dreamworld',
                homeLink: '#/README.md',
                menu: [
                    { text: 'About', link: '#/README.md' },
                    { text: 'Publications', link: '#/pub.md' },
                    { text: 'Designs', link: '#/proj.md' },
                    { text: 'Journey', link: '#/cv.md' }
                ]
            },
            personal: {
                modeName: 'personal',
                theme: 'personal',
                heroText: 'The Wandering Soul',
                subText: 'Lost in colors, emotions, and stories.',
                statusText: 'REALM: DREAMWORLD',
                readLabel: '✧ CURRENT REALM: IMAGINATION ✧',
                btnText: 'Wake Up To Reality',
                homeLink: '#/README-pers.md',
                menu: [
                    { text: 'My Essence', link: '#/README-pers.md' },
                    { text: 'Gallery', link: '#/works.md' },
                    { text: 'Musings', link: '#/blogs.md' }
                ]
            }
        };

        let currentMode = 'academic';

        // --- 精灵生成器 (New) ---
        function spawnWisps() {
            const container = document.getElementById('wisp-container');
            const wispCount = 15; // 精灵数量

            for (let i = 0; i < wispCount; i++) {
                const wisp = document.createElement('div');
                wisp.classList.add('wisp');
                
                // 随机大小
                const size = Math.random() * 10 + 4 + 'px';
                wisp.style.width = size;
                wisp.style.height = size;

                // 随机水平位置
                wisp.style.left = Math.random() * 100 + 'vw';

                // 随机动画时长和延迟，制造错落感
                const duration = Math.random() * 10 + 10 + 's'; // 10-20s
                const delay = Math.random() * 10 + 's';
                
                wisp.style.animationDuration = duration;
                wisp.style.animationDelay = delay;

                container.appendChild(wisp);
            }
        }

        // --- 藤蔓重绘 (New) ---
        function replayVineAnimation() {
            // 简单的移除再添加 class 来触发 CSS 动画重播
            const vines = document.querySelectorAll('.vine-path');
            vines.forEach(vine => {
                vine.style.animation = 'none';
                vine.offsetHeight; /* trigger reflow */
                vine.style.animation = null; 
            });
        }

        function toggleModeWithJump() {
            const targetMode = currentMode === 'academic' ? 'personal' : 'academic';
            window.location.hash = config[targetMode].homeLink;
            toggleMode();
        }

        function toggleMode() {
            currentMode = currentMode === 'academic' ? 'personal' : 'academic';
            renderInterface();
            replayVineAnimation(); // 切换模式时藤蔓重新生长
        }

        function renderInterface() {
            const data = config[currentMode];
            const navList = document.getElementById('nav-list');
            const heroText = document.getElementById('hero-text');
            const subText = document.getElementById('sub-text');
            const modeBtn = document.getElementById('modeBtn');
            const contentBox = document.querySelector('.markdown-section');

            if (currentMode === 'personal') {
                document.documentElement.setAttribute('data-theme', 'personal');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }

            modeBtn.innerText = data.btnText;
            heroText.innerHTML = data.heroText.replace(/\n/g, '<br>');
            subText.innerText = data.subText;
            
            if(contentBox) {
                contentBox.setAttribute('data-mode-label', data.readLabel);
            }

            navList.innerHTML = '';
            data.menu.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${item.link}"><center>${item.text}</center></a>`;
                navList.appendChild(li);
            });
        }

        window.$docsify = {
            name: "Shengqi Dang",
            themeColor: "#6a89cc",
            hideSidebar: true,
            executeScript: true,
            auto2top: true,
            plugins: [
                function(hook, vm) {
                    hook.doneEach(function() {
                        const contentBox = document.querySelector('.markdown-section');
                        if (window.location.hash.includes('README-pers.md') || window.location.hash.includes('works.md') || window.location.hash.includes('blogs.md')) {
                             if(currentMode !== 'personal') {
                                 currentMode = 'personal';
                                 renderInterface();
                             }
                        } else {
                             if(currentMode !== 'academic') {
                                 currentMode = 'academic';
                                 renderInterface();
                             }
                        }
                        if(contentBox) {
                            contentBox.setAttribute('data-mode-label', config[currentMode].readLabel);
                        }
                    });
                }
            ]
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash.includes('README-pers.md')) {
                currentMode = 'personal';
            }
            renderInterface();
            spawnWisps(); // 初始化精灵
        });
    </script>

    <script src="init_proj.js"></script> 
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
